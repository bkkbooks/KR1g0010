body:
  text: 四如講稿卷三宋黃仲元撰大學學記嘗言大學之道大學之教而不言其所以為道所以為教蓋大學者所以教為大人之學又以自别於小學者也小學是已做一箇大學底坯墣大學只是就小學上琢磨出治將出小學是涵養此性大學則所以推明此性之理小學者習其事之所當然大學則窮其理之所以然但這是把大學對小學說且說如何是學又如何是大學大學雖一字說實有二字之義如中庸二字中便是中庸便是庸字各有訓要說大學把這大字輕說不得把這學字輕說又不得讀書最怕隨人腳跟接人聲響今人才說大學但拈出白虎通曰十五入大學尚書大傳曰十八入大學又曰二十入大學大戴禮曰束髮而就大學學大藝焉履大節焉便謂曉得大學來處不思此只論大學年數之不同而實未嘗知大學之名大抵讀書學之一事耳學者所以學盡人之道而已不只是空有一箇軀殼在天地間便喚做人以存於中者有仁義禮智之性感於物者有惻隱羞惡辭遜是非之情具於身者有視聽言貌之則接於我者有君臣父子兄弟朋友之倫人之所以為人者一一全得這箇道理方是學得於我者既全得於人者奚異果無異乎爾不推己而及人可乎哉吾而仁邪使人人而皆仁吾而孝邪使人人而皆孝方見立必俱立達必俱達底意思方見彼此求一箇準則恰好處到這地位然後謂之所學者大大者何包人已貫內外該體用說明德新民止至善這是大綱領止定靜安慮得這是大次第本末始終先後這是大聨屬處欲明先治欲治先齊欲齊先修欲修先正欲正先誠欲誠先致致又在格這是說其所以極效驗之大格而後至至而後誠誠而後正正而後修修而後齊齊而後治治而後平這是著其必然致功用之大自天子至於庶人又包得多少大本亂而末治者否所厚者薄而所薄者厚未之有又推得多少大合而言之止至善為明德新民之大明明德又為三語之大致知格物又為明德之大如是方曉得學字義理又曉然大學意味方是㑹讀大學孟子曰養其大體為大人此明明德之事又曰大人者己正而物正此新民之事易曰大人者與天地合其德此止於至善之事玩此三言則知大人之所以大者如此大學之所謂大又正在此說到精微又未說得三在字只此一大學便是學雖然大看了更小看大看是有以極其規模之大小看是有以盡其節目之詳不就許多條件下工夫如何全得許多性分之所固有盡得許多職分之所當為故曰君子尊德性而道問學致廣大而盡精微所謂誠其意者止故君子必誠其意大學用工處在格物上正得力處在誠意上此章最為樞要上關格物致知工夫賴此而續下關正心修身齊家治國平天下功用由此而推故傳中教人言語極精細而用力喫緊在兩自字上自欺自慊又是君子小人分路處謹獨二字又自欺之隄防自慊之本領小人閒居為不善一假是推原自欺之所以失視指廣胖一段是申言自欺自慊之效驗所謂誠其意者毋自欺也誠意便是要毋自欺非誠意了方能不自欺誠者實也實如五穀之實必十分充足以至於成乃謂之誠若七八分實便有二三分不實亦不成乎物意者是心上發念思量要恁地或不要恁地底最是粘滯牽惹不速迅分曉底物今欲此心發念處直是十分實表裏如一則在乎絶自欺之心以遂自慊之志而必用力於謹獨之地毋者禁止之辭自欺者誠之反毋自欺三字是誠意方法自欺是箇半知半不知底人非是全無羞惡是非之心蓋亦知得善之當為而為之只是心裏也有些子不欲為底意思亦知得惡不當為而不為之只是心裏也有些子欲為底意思此便是自欺蓋雖是有許多善意忽有一箇不好意潛發於其間此意一發便由斜徑以長這便不是實前面意都虛了如救孺子入井純是好意間有內交要譽底意以雜之則便全無惻隱之實如好好色如惡惡臭是就人情那分曉處譬之好色人之所同好好則必求得之而後快足吾意惡臭人之所同惡惡則必屏去不留而後快足吾意意之所快足處便是自慊此是自家表裏真實要恁地快足不是要為他人小人不是大無狀之小人無忌憚之甚者只是自欺底人間字指其處於幽獨而言所以對上文獨字閒居為不善無所不至此惡惡不如惡惡臭也見君子而後厭然掩其不善而著其善此好善不如好好色也若人未嘗不知善為可好惡為可惡又未嘗不知善名為可喜惡名為可諱終是隱微之間自欺病根未盡打併遂纒繞不能自克以至於此然天下事一實不磨胸中之正不正必見於眸子瞭眊之間辭之多寡枝遊亦足覘其吉躁疑誣之實以至容貌舉止無所不見所以人之視己如見肺肝不足欺人祗以自欺也果奚益哉閒居為不善時已是過失掩其不善以著其善又是第二番過失厭然兩字曽子最形容得是不誠如好善未能如好好色之切惡惡未能如惡惡臭之切便是自欺胸次間便覺有缺缺處如何㑹自慊誠與不誠在自慊與自欺而已只爭些子毫髮之間自慊所以對毋自欺而言惟毋自欺故自慊惟自慊故無自欺只是一意說但要毋自欺而能自慊全在謹獨上用工萌於心之謂獨乃幾之微處不止是說人所不知而已所獨知之地常人所以自欺者皆是不畏乎獨君子欲窒其萌須就那獨處分外加謹斬斷為惡之根猛進為善之地然後有以快足其心只看兩箇自字便見獨之不可不謹又須曉得謹獨所以為毋自欺工夫非是既毋自欺又當謹獨小人惟就那獨處不謹故下文所謂閒居為不善一截直是自欺是託小人以戒君子也小人消縮餒沮底氣象如見肺肝不特是見他皮膚上如此和他裏面骨子都看出了蓋實有是惡於中故其惡必形見於外誠中形外是那箇厭然氣色之見於外者自别一掩一著之時見得天理未嘗忘如見肺肝見得為惡終不可掩誠中形外是兼善惡而言誠之以善固形於外誠之以惡亦形於外故復以君子謹其獨結之上云謹獨欲其自慊也此云謹獨防其自欺也皆是要誠其意引曽子曰十目所視十手所指其嚴乎者此言小人不謹其獨則不善之實藏於中而形於外其不可掩也如此富潤屋德潤身心廣體胖者此言君子能謹其獨則善之實藏於中而形於外其不可掩也如此所視所指蓋承上文人之視已如見肺肝底意若為不善不可道是人不知人人曉然共見如此嚴之一字言其昭昭可畏而不可不致戒謹恐懼之功其字乎字皆疑辭正謂人但知所視所指之為嚴自謹獨君子觀之則視指之時其得為嚴乎未若人所不視不指之時為尤嚴富有力則屋自滋潤有德於身則身自光輝潤身即見面盎背底意心廣是說德體胖是說潤心本是濶大底物第恐有所愧怍便窄隘了身體得舒泰無愧怍便是有德既有是德則見於四體之間自然安舒孔子所謂申申夭夭是也德到潤身是極處不誠其能如是乎故君子必誠其意者是推原誠之功用必自用功中來也兩言必謹其獨又言必誠其意者必字是用功著力處謹獨誠意元非二事必能謹獨乃能誠意反復此章因好善惡惡之實而有好色惡臭之譬因小人為不善之實而有如見肺肝之說因肺肝之發見而發明手目指視之嚴因外不可掩之迹而推心廣體胖之效一節深似一節首提起一句則毋自欺為此章之綱領結尾一句與後章異者又深嘆直指誠意之妙中間兩提起必謹其獨又見知至後不是意便誠知之已至而於誠意上尤當實有謹獨之功故致知者誠意之本謹獨者誠意之助彼自欺者是知有所未至耳閒居為不善者是獨有所不謹耳知未至則獨不謹獨不謹則未能毋自欺未能毋自欺又安能自慊未能自慊又安能心廣體胖哉學大學者欲透此關為君子不為小人請自謹獨始中庸凡三十三章中庸二字先民格言故吾夫子嘗曰中庸之為德子思以名其書是書也語髙而不遺卑語末而不遺本始如决萬斛之泉自源而流終如登九級之臺自下而上一而萬萬而一天而人人而天者也三十三章凡三起伏第一章言性道教原於天備於我乃一篇體要下十章即夫子嘗言中庸及仁智勇者以盡其緼十二章言道費隱以明不可離之意下七章又雜引夫子所言以證費隱之義二十章舉夫子言誠結上生下以後諸章乃推誠者誠之之别以終此章而應首章首尾脈絡融㑹貫通不可看後失前也天命謂性此是第一起頭處始言一理者也天命之性是說渾淪大本處率性謂道又就渾淪大本中分别條貫脈絡處率是循其性之自然不涉一毫人力猶待教者理同而氣異也聖人因其性道之本然發見者而修飭之耳教者如此學當何如萬理萬事在天下而具萬理應萬事在吾心靜而存主乎敬以存天命之性於未發之前而大本之中立動而察謹其幾以驗率性之道於所發之始而達道之和行極其至則天地自我位萬物自我育大賢希聖其致則一始言理之同中言功之密終言效之極下十章皆明此章之義二三章皆變和言庸分之則中性而和情總之則中庸皆德行也時中之義可與權者方足語此四章言道不明不行以起下文知仁勇之說五章言道不行以起六章大舜之知七章言不能守以起顔回之仁九章言不可能以起子路之勇不倚即中不流即和十一章又總知仁勇說索隱過於知行怪過於仁半塗而廢不及於勇依中庸則無過不悔則無不及矣君子之道費而隱章又是第二起頭至武王周公達孝凡八章中散為萬事者也實明道不可離之意費者率性之道用無適而不在隱者天命之性體至微而難見夫婦之可知可能者費聖人之不知不能者亦費天地大猶有憾者亦費所以然者至隱存焉故舉詩極言天地上下流動充滿之妙然都從戒懼謹獨處做來所以觸處洞然有此實見實樂下數章大抵推明其用之費而已十三章道不逺人即不可離也下三節皆不逺人以為道之事以衆人望人則道在人以愛已之心愛人則道在己以責人之心責已則人已一道也此章人己不同而其道同下章時位不同其道亦同舜禹之不與顔子之不改夫子之欲居九夷周公之赤舄几几是已君子之道行逺自邇升髙自卑又包下文妻子鬼神及舜文武周公之事妻子兄弟道之至邇至卑者也鬼神造化之迹歷代帝王之事道之至髙至逺者也然盡性至命必本於孝弟窮神知化由通於禮樂下學人事即上達天理此又紬繹修道之教雖然費之外豈復有所謂隱者哉哀公問政又是第三起頭至末章復合為一理者也上結費隱之㫖下起誠道之端一章大意重在誠字修身即九經之首事親即下文之親親曰尊賢曰取人曰知人即下文之尊賢達道五又應上文夫婦兄弟君子之道四達德三又應上文舜與顔回子路上言和者達道總言事物通行之理此又於事物中掇其大者言之達德者天地之性三知三行者氣質之性故說天命之性又說知愚賢不肖之過不及說達德又說知行此學問變化氣質之性而復天地之性者也竪看三知皆知三行皆仁至於成功者皆勇橫看生而安者知之事學而利者仁之事困而勉者勇之事修身以下九經之目道立以下九經之效齊明盛服以下九經之事事豫則立數語又引下文在位不獲乎上達道達德通上下說九經說在上者獲上信友說在下者三段極言其費而兩以行之者一結之一以誠身結之又以起下文言誠之義誠包費隱兼小大又一總腦處然自有聖人君子之别一是天一是人中間又各包知仁勇不勉者安行之仁不思者生知之知從容中道者其勇無迹擇善而學問思辨者學知之知固執而篤行者利行之仁五弗措者困知勉行之勇知是知底事仁是行底事勇只是箇知行做得徹頭徹尾然必曰誠者何天命者誠之源性者誠之體道者誠之用中和者體之所以立用之所以行所以不偏不倚無過不及平常而不可易者皆實理之異名夫婦之知行鬼神之體物帝王之盡倫制者皆實理之無不在豈獨三德九經而已哉以下諸章反復誠者誠之之義而貫命性道教中和費隱之妙天命之性誠明之性非二也修道之教明誠之教亦非二也此一章又下諸章總腦誠而明故先言不勉後言不思明而誠故先言擇善後言固執能盡其性章誠者之誠仁之屬可以前知章誠者之明知之屬至誠無息章極其功效證驗之著至於純亦不已亦聖人自然之勇誠之至明之盡矣贊仲尼章乃即夫子之能盡誠明者以實之大德者天命之全體不戒謹而大本自立小德者率性之大用不謹獨而達道自行至聖章致和者也至誠章致中者也此一套皆天道之誠致曲乃言誠之者之自明而入猶知皆擴而充之之意誠之者之知也誠者自成章著重在誠之為貴正與上文誠之二字相應成已成物誠之者之仁也聖人之道章言尊德性道問學與上文擇善固執是一仁一知之事行先知後以入德為序也不驕不倍各以所處之時位言下二章因而詳之耳末章又自下學立心之始言之衣錦尚絅此是鞭辟近裏切實為已知逺之近三句引帶謹獨戒懼二意來人所不見謹獨之事自此致和則溥博淵泉而時出之可至於聖不動不言不睹不聞之事自此致中則立大本贊化育可至於誠不賞而勸不怒而威此誠之者之動則變也民莫不信民莫不說此誠者之動則變也篤恭天下平此誠之者之變則化也淵淵其淵浩浩其天此誠者之變則化也節節與上文相應至於不顯之妙則明誠之極功而勇之迹泯所謂成功則一自人而入于天矣下文三引詩只用一兩句輕輕接過大意形容不顯之德必若天無聲臭方始打貼得不顯氣象故以至矣二字結之看三大節了又須合看性體也萬殊所以一本道用也一本所以萬殊無思無為寂然不動故曰大本感而遂通天下之故故曰達道言中庸則體用一言費隱則體用二道不逺人以下則因費以明隱即用以見體言誠以下則自隱而之費由體以達用大哉聖道章乃總言道之體用發育峻極體之極於至大而無外三百三千用之入於至小而無間仲尼一章又言聖人該道之體用唯至聖用之所以行唯至誠體之所以立天無聲臭則用即體體即用吾道之極致然首章言道之在天由體之用此聖人一理渾然泛應曲當之事末章言人之造道由用之體此學者於枝葉零碎處一一用工而後合成一箇大本也一部中庸只如此看便見日用之間無一事一物不是合做底事件聖賢之言無一字半句不是分明底指訣先儒所以中夜以思不覺足之蹈之手之舞之也雖然用之不盡理亦無盡暇日當細論之中庸仲尼祖述堯舜憲章文武上律天時下襲水土辟如天地無不持載無不覆幬辟如四時之錯行如日月之代明萬物並育而不相害道並行而不相悖小德川流大德敦化此天地之所以為大也第三十章中庸首章原道之所以得名自率性來末章論化民之效而進於無聲無臭之天中間言誠者天之道則可以贊化育言誠之者人之道則積而明動變化語天地之道悠久而以文王純亦不已證之即聖人久於其道而天下化成之事然未有如此章言吾夫子道化之妙道者天地人物之本也天地人物道之貌象形著也人梏於私與道為二夫子一身表裏皆道故與天地吻合而無間也夫聖聖之相傳者道道自堯舜而始明夫子所以逺宗堯舜之道而法在其中道之所寓者法法至文武而後備夫子所以近守文武之法而道在其中帝王一中庸也天時天運行之節夫子後天而奉天時所以上律乎天律即法也水土地生成之常夫子安土而敦乎仁所以下襲乎地襲猶因也天地亦一中庸也夫子既法帝王又法天地亦循中庸而巳矣豈區區求合其迹哉辟如天地以下四句又見夫子與天地相似故不違底意天之所以為天者道之髙明也故動而升乎上萬物覆焉夫子得是道之髙明則無不覆矣地之所以為地者道之博厚也故靜而鎮乎下萬物載焉夫子得是道之博厚則無不載矣四時錯行以成寒暑夫子與時偕行與時偕極則合其序矣日月代明以成晝夜夫子之心無時不明無物不照則合其明矣無不覆載者是道廣大之體錯行代明者是道變通之用亦一中庸也萬物並育指無不覆載者而言道之並行指錯行代明者而言大化流行物與無妄各殊其分各適其性而不得以相害一隂一陽獨必有對舒慘明晦似乎相反而實相成奚悖之有夫子成大成小一物不棄仕止久速隨時制宜亦由是也小德川流大德敦化二句又是此章綱領德豈有小有大以分而萬則曰小是條貫處流出那敦化底以總而一則曰大是渾淪處敦那化底德者得也大德者夫子得是道之體如無不覆載並育並行是也小德者夫子得是道之用如祖述憲章上律下襲不害不悖是也夫子能盡中庸之道所以小處如此大處亦如此自中庸言之則維天之命於穆不已大德也日月星辰華嶽河海小德也這是天地底大哉聖人之道洋洋發育萬物大德也禮儀三百威儀三千小德也這是聖人底溥博淵泉而時出之小德也唯天下至誠經大經立大本大德也這是吾夫子底奚獨此章哉子思子可謂善形容夫子矣大抵夫子之道本末先後自有次第始焉若有所用其力終焉則無所用其力其造端雖不外乎人心之固有及其至則達天德於無間曰祖述曰憲章曰上律下襲是猶未離乎擬議也如覆幬如持載如錯行代明固與天地相似然猶與造化為兩也至於並育不害並行不悖小德川流大德敦化則上下同流與我為一矣不言夫子之大止言天地之所以大天地之所以為大非天地之大道大也道又即中庸之道也觀天地則知夫子矣雖然天雖大不能載地雖大不能覆而夫子兼天地覆載於一身春不能為夏秋不能為冬月之行遲又不如日之行速而夫子備四時日月於一身至於天地之育萬物有榮有悴有生有滅而夫子道內之生意常自如日月之與四時有盈有昃有愆有伏而夫子之道歷萬世而不朽是天地之大猶有憾而夫子為大天地為小矣又極言之文王不得以逰乎堯舜之天武王不得以逰乎文王之天夫子一身可以堯舜可以文武則其聖於堯舜文武至矣夫子之道如此其大夫子之化如此其久天地不違況聖人乎秦以滅孔氏典籍而亡漢以過魯祠孔而興魯共之衰以壞孔宅唐室之盛以立孔廟有天下者受夫子罔極之恩多矣以儒自命者沐天朝道化之澤其可不知吾夫子之恩乎四如講稿卷三
