body:
  text: 四如講稿卷一宋黃仲元撰開堂講義兊大象曰君子以朋友講習則天下之至說者莫說乎此子曰學之不講是吾憂也則君子之甚憂者亦莫憂乎此信夫講之不可一日廢也然兑言講習而不言所講者何講說云乎哉夫子言講學而不言所學者何講書云乎哉六經未出奚書可講與君言言敬臣與臣言言事君與父言言慈子與子言言孝父與兄言言順弟與弟言言承兄講者講此耳六經既出書未易講合數十萬言緊要只十箇字君臣也父子也夫婦也兄弟也朋友也是理流行乎穹壤之間模寫乎聖人之筆驗之於心體之於身措之於家國天下皆是物也非直為來世口耳之資經學失傳經術分裂紙上紛紛舌端譊譊不獨有病乎經或且病乎身不獨有病乎身且以病其世夫奚益焉是則經不可以不講亦不可以徒講喜髙妙耶其失也誕穴幽深耶其失也晦逞新竒耶其失也鑿守其陳耶其失也拘將如之何而可大傳不云乎易簡而天下之理得易則不勞簡則不煩六經道理公平正大本無﨑嶇學士大夫講明理道只消平平正正從分明處看不從隱僻處看故易向本領上尋不向支裔上尋故簡遊夏於春秋不能贊一辭懼支離也後儒說曰若稽古至三萬言祗添熱閙善學者講道以六經為標本講經以聖賢為準的夫子教人讀經嘗曰溫柔敦厚詩教也疏通知逺書教也廣博易良樂教也潔淨精微易教也恭儉莊敬禮教也屬辭比事春秋教也每經斷以四字顛撲不破魯論於關雎曰樂而不淫哀而不傷八言耳於倩盼素絢曰繪事後素四言耳詩可以興可以觀可以羣可以怨邇之事父逺之事君多不過二十字約而蔽之曰思無邪又僅三言而止鯉也過庭之訓學詩一言字足矣學禮一立字足矣始作翕如也從之純如也皎如也繹如也以成而樂之始中終盡在是堯曰首章寥寥數句包羅許多虞夏商周之心之政至謂禮樂征伐自諸侯出蓋十世希不失自大夫出五世希不失陪臣執國命三世希不失祿之去公室五世矣政逮於大夫四世矣而隱桓莊閔之春秋僖文宣成之春秋襄昭定哀之春秋二百四十二年之間三變綱目兩章可觀而佩之矣孟子之書亦然論春秋曰其事則齊桓晉文其文則史其義則丘竊取之三四語直是斷案後來老師宿儒竟道不到吾於武成取二三䇿即是看書之法天生蒸民有物有則民之秉彛好是懿德多少精神只添一必字故字而義自見凱風小辨過小過大二詩都了多乎哉不多也七篇不言易而句句皆易義之深者實自不言得之六經之學通天下而人人不皆孔孟心知耳目有淺深之殊於是學問有偏正識見有廣狹汗漫如莊周者却解說詩以導志書以導事樂以導和易以導隂陽春秋以導名分即此五言直如快刀利斧劈截將去字字有著落處政未可以人廢言何則講經患乎多言多言則害道書最難看亦難强解春秋微辭隱義時措從宜者為難知禮訛樂缺參訂又難獨詩略㸃掇一兩字讀過便教人省悟此講經所貴乎易簡不可無訓詁亦不可泥著訓詁不可無文義亦不可粧㸃文義不可不折衷先儒之說亦不可純用先儒之說細看他經無解釋惟易有之每卦每爻彖曰象曰之辭便當一部周易古注乾坤文言上下繫傳說卦序卦雜卦便當一部周易正義講易只消如此然聖門雅言惟詩書執禮而學易猶有加我數年之說則非察天地之化極事物之原順消息盈虛之理者焉能識易易尤未易講也吁大冶一陶而質之美者有限六經一原而義之精者無盡化有限而道無盡學而已一邊作冊上工夫一邊作切己工夫豁開雙眼自看得過悟入落處庶幾霜降水涸而涯涘出枝枯葉脫而本根見不在較同異而别為一家談然後可以語自得之學世久無師弟子矣隋王通著書與其徒更相賢聖經之續失之贅自任如昌黎招諸生誨館下不過借問答以發其不遇之鳴竒葩等字識者議焉衡湘以南皆師子厚口講指畫不過授之文詞法度而諸經俱缺商略先朝名儒輩出安定胡氏太山孫氏徂徠石氏希夷陳氏皆其傑然者獨二程之學得於濓溪復有橫渠時相講切直上接乎六經之傳定夫中立程門上足也遊之學胡氏劉氏得之楊之學羅氏李氏得之文公朱氏師籍溪屏山而成於延平又集經學之大成于時有湖學有浙學有江西學派雖不同而正學同言語問辨雖不生於一而正見一然終不若文公之簡易而有法易本義無費辭詩集傳無雜語書說僅三篇他經亦間及之獨四書其用工最精密者也乾淳間吾莆先哲有與文公同時者曰二劉先生學艾軒之學者也以太虛為六經此艾軒言也詩之有序猶禮記之有冠昏等義子夏雖無得於聖人何至穿鑿傅㑹如詩序之無源流三傳諸儒終身蠧春秋而免誅於春秋儻非盡削而煙之則物論終不愜此又二先生自得處末學小子胸中無一紙之識然於二先生亦聞而知之者陋於希世尚友千古竊有志焉祠宇邃然遺像儼然摩挲銘文如侍丈席二先生每謂朋友講習為古今至樂聿登斯堂敬業樂羣盍知其所以樂者昔橫渠講易一見二程至則撤去虎皮謂二程深明易道汝輩宜師之僕何人哉惟當與同志求所以得易簡之道論語此書二十篇孔門理用之書也晦庵先生一生精力萃在此書僕生晚不及親薰而炙之嘗欲以聖人述作之意别為一類其他分為十四卷庶幾有悟入處姑撮其概言之天兮何言時行物生而賦於人者為命豈易言哉天地之性一氣質之習殊其初則甚相近也一念一事之仁或可語人而全體大用雖聖不能一言終身行者猶可近譬而一貫之妙非參莫傳川上之歎往過來續河不出圖斯文焉屬人生也直失則為罔中庸之德亦鮮久矣此當以道體觀之詩書禮可以常言而易未易學共學適道必可與立而權最難達孝弟而後可以學文忠信而後可以傳習惟博惟約卓爾有立忘食忘憂老不知至此當以論學觀之生而知者未嘗不學學而知者成功則一知而不好非真知也好而不樂知未熟也知之為知固所以知不知而作豈其謂知欲致知者當進乎此終食不違造次顛沛猶必於是三月雖久而日月之至當辨賓主容貌顔色辭氣亦必有道以為本立參前輿倚衡此豈不敬者之所能見欲存養者當察乎此視聽言動之勿非則必復乎禮克伐怨欲之不行則未知其仁內省不疚者夫何憂懼過不自訟者斯已矣乎欲克己者當決乎此有身則有家而家道未易齊也泰伯之德民無得稱夷齊之仁所以為賢遊夏問孝而俱救其失孟莊之賢以不改為難擇對者如長如容居室者如衛公子荆夫然後可身之出處又當隨時其行廢有命其見隱有道開之仕未能信騫之使善為辭孔顔之用行舍藏莫不有義乘桴浮海子路尚未知聖人者況晨門荷蕢接輿沮溺丈人之流乎學而不用則已用則治道之當講信節愛時而皆以敬為主政刑德禮四者不可偏廢遊宰武城得於學道雍使南面原於敬簡使夫子之得邦家立道綏動之效不止變魯至道而周之東可西也治不可以無法而又制度之當明也可因則因可損益則損益當儉則儉當拜下則拜下從先進者從其質從周者從其文豫對問社賜欲去羊皆不如顔淵為邦之一問然天下未有無理之事亦未有無事之理曰階曰席相師之道杖出斯出後長之義每事而問乃謹之至時亡而拜亦禮之稱請粟與粟必權取與之義均之與人何必出納之吝醯乞與鄰惡情之矯借馬今亡恥俗之偷其教人則隨中人上下之質嚴君子小人之辨不能憤悱者固不啓發不得中行者亦與狂狷鄙夫之必竭童子之與進雖欲無言而無行不與二三子也教則教矣而又有警戒之意存焉勉後生之可畏懼沒世之不稱巧言令色之必恥居下訕上之必惡六言六蔽之防其偏三友三樂之戒其損言言針砭句句範防蓋不一人一事而止而所以警戒者又懼其舍正道而適他岐則嚴其辭曰攻乎異端斯害也已巫醫之不恆小道之恐泥亦慮其溺於邪而趨於末也若聖賢氣象則異於是簞瓢陋巷不憂而樂誾誾侃侃無非英才裘馬共敝而無憾善勞無伐而無施其與老安少懷者固異然皆志於仁者由求赤之真實㸃之灑落政未可議其優劣而聖人一問一答從容笑語如家人然溫良恭儉讓子貢知之天將以夫子為木鐸儀封人知之申申夭夭溫厲恭安門弟可謂善記而鄉黨一篇真活夫子今猶想儀式典刑之如在也學者儻以是觀之浸潤求趣不用或問集注足矣渙然怡然不用注解正經足矣又久之左右逢原自有一部論語在方寸間雖然談何容易論語學而第一章孟子梁惠王第一章論語堯曰第二十章孟子盡心下第三十八章論孟六經之階梯二書首尾次第各有條序而不可亂論語每章不過數句多十餘言理義儘自精深孟子或千百言然語意明潔血脈貫通無一字閒近時學者病在好髙讀論語未理㑹學而時習便說堯曰讀孟子未理㑹仁義便說盡心當先其體而後其用可也學而梁惠王第一章是立本領處堯曰第一章盡心下卷三十八章是接統緒處前二章是理而用藏其間後二章是用而理行其間天下未有無用之理亦未有無理之用故各以首尾二章與同志評之學而時習之章梁惠王第一章論語開卷重在學習字上學之要在於習易以水洊至為習坎學之有習亦猶是也習則熟矣仁熟而忘於仁義熟而忘於義如何不說自求自趣說既在我則樂亦在我矣必有朋逺來而後樂者蓋樂之至將與人共之也易之同人無適非朋然有不必同者故人或不知何愠之有君子之學如是而已故以君子結之說樂與不愠字對君子是總上文說而是承上接下之辭之是指所學所習之理此君子之一行故言不亦乎是設為疑辭上二句是心與理一中二句是心與人一下二句是心與天一論語二十篇無非學習之理與事此開其端耳若孟子答梁惠王之問是孟子入門戶處仁義只是天理利便是人欲人之所以為人仁義之外别無箇道幾曽帶箇利字稟賦出來仁非專主於愛而愛莫切於愛親義非專主於宜而宜莫大於尊君二者天理之自然因物我之相形而計較之心重一有所為即入於利孟子一書先正人心七篇之中純說仁義而此章託始所以拔本塞源也先言亦有仁義是指本心之善端辭何其嚴次言亦曰仁義是納其君於當道辭何其婉曰未有仁而遺其親未有義而後其君是指其效之必然意何其切孟子之曰有曰未有異於梁王之曰將有矣何必曰利凡兩言之譬如快刀利斧和根截斷王與大夫與庶人曰何以利固俱不可士為仁義之宗主所學者何亦胥曰利此又孟子之所深憂也合此二章孔子所謂學習仁義而已矣孟子所謂仁義即是學習第一件大大事行其所學所習則仁義達之天下這是立本領之大堯曰第一章盡心下卷第三十八章論語終篇堯曰首章雜引大禹謨湯誓泰誓武成之言以稱道堯舜禹湯文武之事自謹權量至公則說蓋逸書文夫子時書猶無恙故常諷誦此數十語弟子集論語時追記之以見夫子不忘帝王之言欲行帝王之事而不可得也然堯舜禹之授受必首以厯數為言而繼之執中者蓋初有國者必為之厯以頒天下而厯本於數正朔以之正教令以之行堯之厯象日月星辰敬授人時蓋取於此舜之在璣衡以齊七政以協時月正日受之於堯也禹之錫洪範九疇以治厯數以正嵗月日受之於舜也惟厯數在躬而使天祿永終者執中而已中者何道是也上合天理下當人心中間事事物物無適非中所以為道非空虛無據之謂堯咨之略舜命之詳其實一耳湯武革命亦惟應天順人與夫賞善罰惡責己恕人大綱小紀本數末度莫非道也下文謹權量審法度數語蓋同時事國家之制備於是修廢官以分其職而後達其政於四方立二王後所以仁異代封箕子禮商容所以繫羣心養生慎終所以足國而厚俗寬信敏公所以盡己而及人皆王道之至也帝王之道簡而易行如此夫子既不克施於世得不時時諷道以示學者乎於是見聖學之傳若孟子盡心末章即堯曰首章之意堯舜湯文孔子皆聖人也乃曠世而一出禹臯伊尹朱望宜生亦次聖大賢者也或同時而輔佐見而知之者非易聞而知之者非難此句受重不在見字上全在知之兩字上知以心言之以道言其所謂道者即堯曰之所謂中也天下無二道聖賢無兩心苟心知之所同然則見亦知聞亦知也臯伊之學見於謨訓至精至粹萊朱若誠仲虺則亦伊尹之亞武王問道於太公公陳敬義仁則所以為文武師者豈無所自來哉宜生師傳雖無所考而預武臣九人夫子許之才難是亦足厠諸賢之列矣由孔子而來孟子雖憂後學之失其傳而以道自任之意蓋有不得而辭者然而無有乎爾則亦無有乎爾先儒謂近而無有見而知之者則後乎此又豈復有聞而知之者不知此一轉語蓋孟子設為疑之之辭不敢自謂已得其傳也合此二章道在孔孟之身而孔孟必歷敘羣聖之傳者蓋羣聖之所以見諸治者皆道之用今也道而不見於用固有孤前聖之望道而又不傳於後曷俟後聖於方來雖然孔孟豈得已哉這是接統緒之大又合四章而觀孔子性仁義者所謂誠存而猶自强不息孟子身仁義者所謂存誠故所願學之者孔子惟先立本領之大故能接統緒之大學者將欲接孔孟之統緒必自學習仁義始不然本領不立孔孟未易接也況敢望孔孟以上諸聖人乎子曰人能𢎞道非道𢎞人人者何有氣有生有知有義所以異於物也得天地之德以為性稟隂陽之交鬼神之㑹五行之秀以為氣天地亦待之以為主故又曰人者天地之心道者何命之源性之本心之神情之動仁義禮智信之常父子君臣夫婦長幼朋友之倫曰中曰一曰極曰誠皆道也人所以載是道也道所以為人之理道非人則何所附麗人非道則不過血肉之軀耳吾夫子曰人能𢎞道非道𢎞人者何此八字只一意貫說人是一箇人方能廓大其道道只託於人安能使其大哉𢎞有二義人之得是道於心也方其寂然無一理之不備亦無一物之不該這是容受之𢎞及感而通無一事而非是理之用亦無一物而非是理之推這是廓大之𢎞其容受也人心攬之若不盈掬而萬物皆備於我多少宏濶此𢎞之體其廓大也四端雖微火然泉逹充之足保四海此𢎞之用性分之所固有者一一盡收入來職分之所當為者一一要推出去方是𢎞雖然或有能𢎞者有不能𢎞者何此𢎞字全就作用說能與不能存乎人耳鈞是人也有一人之人有十人之人有百人之人有千人之人有萬人之人有億人之人有兆人之人人至於為兆人之人者然後位乎天地之間立萬物之上始得謂人之人其人之至乎故曰聖人人倫之至惟聖人然後可以踐形到得至處踐處其𢎞多矣人同是仁也必如堯舜以不忍人之政覆天下斯謂之𢎞人同是義也必如夷尹孔子行一不義殺一不辜而得天下皆不為也斯謂之𢎞人同是禮也必如周公太平六典無非廣大心中流出斯謂之𢎞人同是智也必如禹之行其所無事雖天之髙星辰之逺可求其故千嵗之日至可坐而致斯謂之𢎞孝不如堯舜之大武王周公之達非𢎞也忠不如禹臯益稷之謨周召之誥非𢎞也中也一也不如堯舜禹湯之相傳非𢎞也極不如箕子之九疇五用皇極錫福庶民非𢎞也誠不如子思之中庸盡其性又盡人盡物以贊化育與天地參非𢎞也莘之耕所樂何道必欲以先知覺後知先覺覺後覺不𢎞何以任天下之重巖之築所學何道乃弗克俾厥后惟堯舜其心愧恥不𢎞何以作舟楫霖雨之用春秋之末孔子元聖也斯文未喪以天自許如有用我為東周乎律天時襲水土四時行日月明萬物育孔子之所以為𢎞司冦攝相誅正卯却萊兵此特吾道小試之萬一耳七雄之季孟子亞聖也氣配義道塞乎天地居廣居立正位行大道富貴不淫貧賤不移威武不屈孟子之所以為𢎞闢楊墨承三聖此特衛道之效彰彰者耳吁如堯舜禹湯武王周公孔孟然後謂之人然後謂之能𢎞道不者管仲亦人爾局量淺規模狹既無帝王之學以為之本而私欲先已隔絶於其中物我不能貫通於其外若何充拓得到天地變化草木蕃處又安能與上下同流哉故孔子曰仲之器小孔之道至今為萬世宗師孟之道至今不在禹下後孔孟幾千萬世而來者幾千萬人豈獨無與聖賢異世而同符者乎隋王通以三才九疇為布衣事乃掇拾兩漢而下文字語言之陋功名事業之卑僭擬六經便要自比聖人唐韓愈原道一篇粗知本領然未免浮華放浪之習富貴利達之求之人也生不值文明之運質又稟醇醨之間毋怪乎為隋唐人安可責之以孔孟之道道無絶續無今古苟非其人道不虛行人如孔孟則道亦𢎞於孔孟或曰人人必皆如孔孟乎曰顔淵不云乎舜何人也豫何人也有為者亦若是有為二字多少𢎞道力量盡在箇裏大抵人未易為也亦不難為也人字從丿從乀於畫甚簡於義甚大領惡而全好脫凡近而逰髙明莫為一身之謀而有天下之志莫為終身之計而有後世之慮不求人知而求天知不求同俗而求同理且要做成一箇人先立乎其大者則小者弗能奪此所以為大人做得大人了然後由正修而齊家由齊家而治國平天下然後本諸身徵諸民考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑道於是乎𢎞矣若但以圓首方足而謂之人知飲食男女而謂之人有之無益無之無損是人也亦物也又何以異於人哉志道者切莫把第一等人讓與别人做然後謂之𢎞道子曰行夏之時行夏之時四言耳却議論關涉最大朱文公謂以建寅之月為嵗首時之正令之善是矣然謂子丑寅三辰皆可而三代迭用之未免踵漢儒之陋雖蔡書傳亦然唐子西云唐虞固以建寅為正夏后之時其法尤備非謂建寅自夏始此說得之至謂商之建丑其義安在似有所見而曰周始建子為正不廢夏時之正嵗亦未免循習三統之說禮運記孔子得夏時於杞注曰夏四時之書其存者有小正家語問禮篇吾得夏時注曰於四時之正正夏數得天心耳尚書𦙍征政典曰下注可知其為夏四時之書夏之志四時之書也夏之書不獨有小正亦有大正夫子時猶及見之秦項二火之後漢儒所見者僅小正耳夏小正今見於大戴禮第四十七篇其文約嚴不類秦漢文字戴德傳則訓故小正星分昏旦伏見中正當鄉若寒暑日風冰雪雨旱之節草木稊莠榮秀之候羽毛鱗裸蠕動之屬蟄興粥伏鄉遰陟降離隕鳴詬之應罔不具紀而王政民事係焉以此觀之所謂夏時者非以建寅為正然後謂之夏時蓋由厯數以來授時之法如堯典告民事者至夏而悉備諸家之厯未有久而不差惟夏小正之書授時為無差故曰行夏之時此行字記十二月之所行與吕令所謂行春令行夏令相似吕令秦吕不韋春秋十二月紀之首章不韋不用秦正而用夏時者亦以夏時為可据也今人才說行夏時便把三正做題目不知三正二字尚書甘誓孔傳止謂得天地人之正道何嘗言子丑寅也三正之說自劉歆始班固白虎通用之謂夏以十三月為正十三月今之正月夫子所謂行夏時者蓋夫子觀夏禮於杞僅得夏人四時之書於厯象之法四時節氣弦望晦朔最得其正故以此答顔淵之問非有意於改正朔也大抵治厯明時有天下者第一件大大事堯典開卷便理會厯象日月星辰敬授人時以閏成嵗箕子為武王陳範便一曰五行四曰協用五紀這處錯事事都錯夫子所以把行夏之時做第一句說但禮記言夏時又言坤乾者何哉乾坤者周易之泰十二辟卦泰為建寅之月孔子得夏時而不得乾坤則無以知夏之所以久而不差孔子得乾坤而不得夏時則無以知乾坤之可以制厯然周易泰大象不言地天泰而言天地交泰乾坤之用位不可以不正乾坤之氣不可以不交天地者正尊卑之位交者互升降之氣小戴禮曰吾得坤乾家語又曰吾得乾坤恐當以家語之文為正或者惑於三易之說謂歸藏始於坤不知三易皆以乾為首年代久逺古書遺逸奚獨殷易哉請因夏時併及殷易願相與講明之子曰參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣子曰賜也女以豫為多學而識之者與對曰然非與曰非也豫一以貫之此二章曽子是行得到子貢是知得到但未知統宗㑹元之要故夫子親傳密指授之有不可容言其所以然者程伯叔子李延平朱晦菴諸老先生解析已極分眀陳北溪劉習靜楊志仁陳復齊四三大儒問答又詳且盡若便下注腳未免床疉床屋架屋之誚後來讀論語者謂曽子未唯之前只理㑹得萬殊既唯之後方理㑹得一本是曽子全無本領到做將去此一也夫子只謂此理渾然無分精粗體中有用用中有體曽子何嘗向門人說一是忠貫是恕此二也或又舍一貫而說忠恕有學者之忠恕聖人之忠恕天地之忠恕此三也僕僭以愚見述於左方唯同志共是正之前一章道字後一章學字若二也實一也道是渾淪底學是條理底道非學何以致格學非道何所據依古人未嘗廢書而學非讀書之謂蓋其所學者皆道也此如公孫朝問於子貢曰仲尼焉學而子貢對以文武之道學是學夫子之學夫子之學即道也吾字與吾十有五而志於學之吾字同豫字與豫欲無言之豫字同一以貫之四字上一以貫當連接說下之字是指事事說天下未有無理之事亦未有無用之體此之字如學而時習之之字是指所習之道而言句法又與禮以行之孫以出之相似之如一堆散錢一以貫如一條繩子穿將去前章參乎後章賜也乎疑辭也決辭聖人用字各有律令參呼其名而直告之却著一乎字蓋疑曽子之必能領㑹也賜呼其名而問以發之只著一也字蓋謂子貢未能領㑹猶異時之語羣弟子同也前章唯字與後章然非與三字對唯者應速而無疑之辭然者方信非與又疑前章而已矣與後章非也字對而已矣者竭盡無餘之辭非也者決之使不能疑也前章夫子之道忠恕與吾道一以貫之對後章多學而識之與豫一以貫之對女指子貢又與豫對者字夫子自指也與字亦疑辭也夫子之道忠恕是下面添一層話女以豫為多學而識之者是上面添一層話告之之辭有先後或唯或不唯則二子之學深淺可見矣讀此二章者只拈起曽子子貢說都是從下面說上愚今從吾字豫字說夫子起是從上面說下蓋二章本意是夫子把箇身做樣子說與二子看却教二子自去體驗得似吾與豫未似吾與豫也夫子覺人之機在此只以論語二十篇觀之自夫子之一身而言則在鄉黨而恂恂在朝廷而便便與下大夫言則侃侃與上大夫言則誾誾歌不苟歌笑不苟笑歎不苟歎至於聞韶則食而不知肉味是也自夫子出處之大者而言則去魯而遲遲去齊而接淅衛君問陳則明日遂行季孫受女樂則不俟致膰而後去公山佛肸之召則欲往而竟不往以至南子之見陽貨之諾又委曲而不失其正者也自夫子之教人者而言則愚魯辟唁者有以去其偏果達與藝者有以遂其長由兼人則退之求自畫則進之師過則抑之商不及則勉之是也自夫子之答問者而言則問仁一也答顔子異於仲弓答子張異於司馬牛而樊遲之問終始凡三所以答之各不同問政一也告子路者不以告子貢告子夏者不以告子張而當時君大夫如齊景如季孫又各有以針其失以至由賜之問士子遊孟孫之問孝亦莫不皆然自夫子之應事接物者而言則老安少懷朋友信之闕黨之將命互鄉之與潔原壤之扣脛孺悲之不見接輿則欲與之言荷蓧則告之大義其答王孫賈斥子西又有不惡而嚴者原思之辭粟則與之冉有為公西請粟則責之顔路之請車則却之以至以小人責樊須以不仁責宰豫鳴鼓而攻糞土之誚數子莫不內愧而心服也又大而參酌禮樂也則時輅冕韶損益文質以求其中又托春秋以立一王大法蓋有建諸天地而不悖百世以俟聖人而不惑者其得邦家也立斯立道斯行綏來動和又有不知其所以然而然者蓋莫非吾夫子之所謂道與夫子之所謂學豈但泰伯篇末數章堯曰篇首一章哉凡若是者千條萬緒真所謂如四時錯行日月代明而不相悖如萬物並育而不相害如百川之隨其脈絡日往而不息然聖人亦豈有意而為之哉亦自夫混淪大本中流出耳故曰吾道一以貫之女以豫為多學而識之者與豫一以貫之雖然是不可以徑造也學者必有下學之功而後可以窺上達之妙事事物物真知實踐然後可以㑹夫一以曽子之純篤子貢之敏達朝夕親炙聖人莫不由此而入夫子知參乎於吾道已有所得故不待問而直告一以貫之之體又知賜也之於學也將有所得故先發其疑而後告一以貫之之本告之者何使之合內外之道耳曽子之外獨告子貢者以子貢又優於羣弟也然子貢始信中疑終又不能如曽子之唯抑在未聞性天道之前乎抑因夫子之言而遂得聞乎若以是遽少子貢又非豫夫子意也回看前章曽子一唯之外無復問難吕成公猶曰曽子之言雖悟而自有未悟者在其中故聖賢之道貴其不已假使門人而不知問曽子遂至忘言吾道其不墮於空虛渺茫之域與忠者誠實之謂而恕所以行之者也此在吾道中一事耳未可以當一貫之妙一貫之妙難言也以為精微精微不可得而盡以為髙明髙明不可得而極蓋亦求諸天求諸物又反求諸心則一而已學至於此無餘事矣然而難以形似擬議故曽子付之一唯曽子自知則可以之語人則不可不得已而有忠恕之目蓋門人未可語上使之由忠恕以入道此曽子能致曲以傳道也學者見曽子曰忠恕則只以忠恕求吾夫子又失之矣此吾夫子所以曰豫欲無言與四如講稿卷一
