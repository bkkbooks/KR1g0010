body:
  text: 四如講稿五經總義類提要臣等謹按四如講稿六卷宋黃仲元撰仲元字善甫號四如莆田人咸淳七年進士授國子監簿不赴宋亡更名淵字天叟號韻鄉老人教授鄉里以終考福建通志暨莆田縣志皆載仲元有四書講稿今觀是書所講實兼及諸經不止四書其説多述朱子之緒綸然亦時出新義發前儒所未發如行夏之時則據禮運孔子得夏時於杞注謂夏四時之書而不取三正之説周官井田則謂周時皆用井田而不取鄭氏畿內用貢都鄙用助之説伯魚為周南召南則據詩鼓鐘及內傳季札觀樂謂南即是樂又謂周召為二公采邑非因二公得名雖按之經義不必一一吻合要為好學深思能自抒所見者也此本出其裔孫文炳家藏已有殘闕嘉靖丙午始雕板印行朱彛尊經義考但載其所著經史辨疑而不及是書當由刋在家孰閩中僻逺偶然未見傳本歟乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b076d0aa136815d5a31b038fc41fd080d07618dbb7a8525133216bbd2eb31664
