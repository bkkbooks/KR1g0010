body:
  text: 四如講稿五經縂義類提要臣等謹按四如講稿六卷宋黄仲元撰仲元字善甫號四如莆田人咸淳七年進士授國子監簿不赴宋亡更名淵字天叟號韻鄉老人教授鄉里以終考福建通志暨莆田縣志皆載仲元有四書講稿今觀是書所講實兼及諸經不止四書其說多述朱子之緒綸然亦時出新義發前儒所未發如行夏之時則據禮運孔子得夏時於杞注謂夏四時之書而不取三正之說周官井田則謂周時皆用井田而不取鄭氏畿内用貢都鄙用助之說伯魚為周南召南則據詩鼓鐘及内傳季札觀樂謂南即是樂又謂周召為二公采邑非因二公得名雖按之經義不必一一脗合要為好學深思能自抒所見者也此本出其裔孫文炳家藏已有殘闕嘉靖丙午始雕板印行朱彛尊經義考但載其所著經史辨疑而不及是書當由刋在家塾閩中僻逺偶然未見傳本歟乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0e131aa994597b5491a60e10c70dd74181fe7652d0217c700cda398f53375494
