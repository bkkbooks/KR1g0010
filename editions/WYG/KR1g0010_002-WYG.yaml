body:
  text: 四如講稿卷二宋黄仲元撰顔曽思輿之學夫子門人三千其受業身通者七十餘人然得聖人之道者不過顔曽二子何其難顔淵没子非私慟也懼斯道之無傳也其後幸而得參少孔子四十六嵗是道賴參以傳參傳之子思子思傳之孟軻韓退之曰孔子傳之孟軻而不知曽子得之夫子子思得之曽子孟子得之子思也自生民以来徳未有如夫子者也大徳必得位位不稱徳故天生哲人使傳其道在孫得以淑其後人其報固應爾也顔子未嘗有述作其徳行志意僅見於論語問答之際曽子之學大㫖則有大學一書班固志藝文以為子思二十三篇不知其書散亾於何時中庸二篇今僅見一篇而已孟子七篇大抵皆祖子思者也今觀四子傳道用功切要處顔子工夫只在克已上克己者克去私欲才知非禮便勿為如豁開雲霧便覩青天如快刀斬竹一斫一段如屋裏有賊便開門逐去勿令存在曽子工夫全在格物上格物者窮天下事物之理精粗小大大而天地之所以髙厚小而禽魚草木之所以然或論古今人物而别其是非或應接事物而處其當否今日格一件明日格一件如好古博雅君子見古器物彛鼎圖畫篆刻斷落不可攷者一一辨其款識楮墨於其所自来子思工夫全在弗措上弗措者學問思辨有不得即不容放過如掘井不及泉弗棄也如為山欠一簣不止也孜孜焉乾乾焉如天運無息日月流轉百倍人之功千倍人之功何患有弗得孟子工夫全在養氣上養氣者以集義為主勿㤀是工夫不可緩勿助長是又不可急如有田不知芸苗令其自長固不可憫其不長而拔之欲長又不可如煉丹有文武火火冷則灰死火猛則丹走惟慢火常在爐中可使二三十年伏火然後養得成丹孟子下工夫有節度如此所以成浩然之氣而能不動心既看四子於道用功處又看四子於道有得處顔子初學道時胸中查滓尚未瑩在方欲去鑚仰他又愈見他堅髙要入頭不得自聖人教他博文約禮方一向低頭做去心地日開自要討住不得真積力久方見得此理常在面前卓然立地此時方是十分見得親切此顔子有得處曽子之學主於誠身其於平時日用觀省而服習之逐件盖已了得熟矣惟其未能有以見夫道之大全則不免見一事為一理及夫子以一貫之語喚醒之適當其可而曽子亦於言下便領知向之所從事者雖萬理萬殊所以貫之者未嘗不一故慨然一唯當之而無疑此是曽子有得處子思所得在費隠字看得道體流行於事物之間大極於天地小極於毫髮充塞彌滿無一物一事不有其用之廣如此故曰費然其所以然之故則隠於事事物物之間無聲臭之可聞無形迹之可睹故謂之隠鳶之飛為鳶之道魚之躍為魚之道所謂信手拈来頭頭是道只是無人領會得此子思有得處孟子所謂得在深造以道處此道字非道徳之道乃深造之方法不疾不徐之謂以法度而深造之優而㳺之使自得之厭之飫之使自趨之欲其自得之也謂之自得方是己物無一毫假於外左右逢原意最好左右有近意有不一處意至於自得則理在左右之近觸處見本原隨取而逢見之此是孟子有得處四子之有得皆自用功中来苟不用功何縁有得看他有得得了又看他資禀如何聖人徳無不備顔子亦煞周全了只比之聖人便有些未純一終是剛明較勝不知者便把顔子做柔善人看若曽子篤實亦是强毅子思孟子皆是剛毅底人以此終有立脚故能得其傳但顔子明睿不似曽思用力孟子才髙難學又不比顔子親切有依據也看了四子資禀又當看四子氣象孟子氣象似子思子思氣象似曽子曽子氣象比顔子較麤些顔子氣象比聖人微有迹耳學者欲學孔子當先學四子學四子當熟讀四書看他何處是用功何處是有得資稟為如何氣象為如何皆得想見由是焉讀六經書為君子儒用之則行捨之則藏脩身乎治國平天下乎致中和而位天地育萬物乎獨善其身可也兼善天下可也無不有以盡吾性分之固有職分之當為則夫拜斯堂也如親見四子如親見聖人不然不讀其書不知其人褒衣巍冠僕僕亟拜瞻之在前其顙有泚仁義禮智之端章仁義禮智樂之實章此二章七篇大總腦處前章重在仁字上却包義禮智説後章對説仁義却和知禮樂説前章重在端字與知皆擴而充之一句不説端字則説充字不来後章重在實字與知斯二者弗去一句不説實字則説生字不来文字各有血脈二章都指良心真切處説這便是信實只是信字所謂人皆有不忍人之心者上面人字總説天下之人下面人字單指箇人説如下文所謂孺子便是人不忍是此心割捨不得只是下文惻隠之心所謂先王有不忍人之心斯有不忍人之政五句此心人人有之先王亦有之但人不能充聖人便能充之百篇之書南雅之詩六典之禮都是不忍人之政以政發心心心相感不言自化宜如運掌之易所以謂人皆有不忍人之心者六句又再提起説要見本心之真當乍見時此豈有所安排造作而怵惕惻隠自不知従何而生使内交使要譽使惡其聲而然則偽矣故著三箇非字由是觀之以下九句是字指孺子入井一事説耳因論惻隠便引箇羞惡辭讓是非之心出来惻隠羞惡辭讓是非八箇字一字一義都指人己相形説却就事事反處看出正道理来無此心則俱為非人言其必有也惻隠之心仁之端也以下八句須曉得不是仁義禮智只是仁義禮智之端仁義禮智性也惻隠羞惡辭讓是非情也性情字俱従心性是心之静情是心之動心統性情者也端是情之發見處注謂端首也疏謂端本也朱文公以為緒也如繰絲然先尋其緒則千絲萬絲續續而上因情之可見而後知性之不可得而見者皆自然而然者也名自外立理由中出非是使人學為仁義禮智也所謂人之有是四端也猶其有四體也以下六句人字應上面人字有字應上面無字又以四體而證四端之必有也自謂不能者是指人説謂其君不能者是應上面先王説先王之政念念不忍事事不忍後之為臣者獨不能引其君志於仁乎所謂凡有四端於我者知皆擴而充之矣七句又再拈起説凡字才謂人皆是我字是人人之所謂我我字與上自字對皆字與上凡字對知字又與上能字對始患其不知知患其不能擴充故末稍歸重在知字知須是在人體認得箇本心形見處充字又重知字了知不能充是只見得便住息火之明遏泉之行此將誰咎始只是上面端字充得去者足以保四海便是説先王之政不能充者不足以事父母便説人之自賊者充是塞乎天地之間皆此仁也自然擴了更不消再説擴字這便是人能𢎞道底道理保四海者滿腔子純是天理不足事父母者滿腔子純是人欲此之謂失其本心故七篇教人體認良心善性後章專就事親従兄上説較切近𦂳要在實字人身之初有父兄而已身者父之遺體兄者分父之氣體而先者也事親須見事意従兄須見従意不於事與従上玩味則終無以識仁義之實理下面三箇斯二者只是事親従兄既知之又弗去知是見得明弗去是守得固事與従又有多少品節儀文在裏面行得恰恰好不増一分不減一分便是理之實由中而出無些勉强便是樂之實樂則生以下三句只是事與従之間常常做得熟自然浃洽周流油然而生不能自己到這田地觸耳所聴觸目所視無所不合而不知足之蹈之手之舞之這便是四體不言而喻矣前四箇是也字都是説用工處到樂處便不説是也字了這處最要看所以樂所以生者如何生字與實字應實是箇生生種子這種子只在人腔殻子裏驗之吾身事親従兄是就原頭發見處説知弗去是就體認操存處説節文是就纎悉微宻處説樂是就成熟結果處説生惡可已如碩果不食善端萌蘖更無歇時足蹈手舞只是形容枝幹暢茂花蕚敷榮可玩可悦處孟子指箇實字示人雖田更野叟亦足知此學者不能知之而弗去如禮樂何是亦衆人而已矣反復二章前章不言實而非内交非要譽非惡其聲此便是實心形見後章不言充而樂則生生則惡可已這便是充塞氣象後章言樂而前章不言樂者何充之足以保四海如之何而不樂不充之不足以事父母樂何従来哉前章又當㕘情可以為善章看恭敬之心即辭讓之本不言端者直因用以著其體耳後章又當㕘君子所性章看木有實則生有根則生性之四徳根於心者深故其生色也輝光乎前充盈乎後旁溢流通乎左右上下而亦不自知也此惟有徳者能之吁通天下鈞是人也人鈞是仁義禮智也而非夫人相與講習之則道不明也不行也必有先覺之士而為之傳是以與人道相為無窮而不可廢周東而微國雄有七上無禮下無學為士者倀倀然流入於異端邪説以斵喪其本心之天母食弗食兄室弗居此豈能充其類者愛無差等施由親始此豈知本之一者大事所當盡也而父兄百官皆不欲於惻隠之心乎何有之墦間乞其餘而妻妾相與訕泣於羞惡之心乎何有簞食豆羮至㣲也而非其人則見於色鄉原亂徳也而不知其似而非於辭讓是非之心乎何有七篇一書吾孟子車安得不痛切與之言哉惟無是非故無惻隠則語之以矢匠擇術不可以不慎惟無羞惡故無辭讓則喻之以嘑蹴爾之不受不屑曰人能充無欲害人之心充無穿窬之心而仁義不可勝用又繼之曰充無受爾汝之實則無所往而不為義乃所以充吾仁也惟恐人之自賊也語曹交以孝弟道滕文以堯舜見觳觫之不忍則告之舉斯心加諸彼有餓莩而不知發則責之以惡在其為民父母又不敢謂其君不能者也教之以體認教之以充廣探幾㣲之先辨理欲之界正人心之初究治本之原如子車者然後可謂善講學天理民彛之在雖今猶古其誰無立達之仁而忍曰學之不必講講者則講其大者與臣言言忠君與子言言孝父與弟言言悌兄與友言言信友毋使養其小體而終身為小丈夫庶㡬内則知仁義之實外亦能充其惻隠羞惡辭讓是非之端雖然事親従兄孩提之童可知可能似易易事孝未如舜五十而慕弗去地位老尤難難若夫鄉鄰有鬭往救則惑惡甚於死患有不辟餽七十鎰受以為是章稱不孝従禮貌之則子車之於是四端也權衡輕重亦必有道甚矣學之未易講也孟子貢助徹章周官井田居今思古常患久大之法不得行引經據古常患因革之意不獲明唯其不行所以諸儒傳其意愈不明也使法之行常如成周盛時則無廢壊無更改何不明之有奈去古浸逺田制日壊聖經厄於煨燼厄於毁誣諸儒隨經以生傳鑿傳以附經又取雜説以亂經此三厄矣然諸儒自晦不足晦經而存乎經者未嘗一日不明但以經釋經斯可也大抵古者封建井田學校選舉師田冠昏射饗等皆一統事而封建井田其本也井田之所由来久矣但至周而始大偹當時普天之下盖無不為井田為周官之學者亦多矣漢鄭司農前朝盱江李氏其尤者也皆以為周之天下不純用井田其説曰載師職近郊十一逺郊二十而三甸稍縣都皆無過十二安在為井田之法以民力同養公田而以年之豐凶出斂法則孟子所謂雖周亦助曰此當十而一此當二十而三此當十而二此孟子所謂夏之貢法校數嵗之中以為常而不計其年之豐凶者周之畿内不用井田而用井田者畿外侯國之制此鄭康成等説也匠人職九夫為井止同間廣二尋深二仞謂之澮曰此畿内采地為井田之制遂人職夫間有遂止以達于畿曰此鄉遂溝洫之法甸稍縣都十二取民之法既與畿外井田九一之法不同縣都采地一井一溝之法匠人又與鄉遂十夫同為一溝之法不同則誰謂成周敷天之下畿内與畿外鄉遂與都鄙盡用井田之法此亦鄭司農等説也彼豈不知周用井田九一之法惟於載師與遂人所言不得以通則强為之説彼又以為甸稍縣都田税有至於十二則非十一之義則又曰周田税輕近重逺者近者役多逺者役少畿内用貢法而侯國用井田者欲使恤其民也康成此等語李氏多襲用之謂如是乃二義可並行而不相悖夫成周實舉天下通用井田其著於經本無牴牾而讀者不知經文有上下相蒙縦横互見之義故輕為之説耳吾觀載師職曰凡任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二此皆指園㕓言之冠國與園㕓三字於其上而其下者悉蒙上文今以十二為田税用畿内用貢法以井田為侯國用之王畿不用則經文九夫為井等語皆可棄而不顧矣遂人言十夫有溝以横言之匠人言九夫為溝以方度之其實則一是縦横互見彼此相明而已而曰匠人溝洫之説采地制井田異於鄉遂殊不可曉夫考工記元不在六官之數何必合匠人與遂人並言載師謂之任地則非田也謂園㕓又非田矣漆林又非田之所植豈得謂之田税司馬法乃齊景公時大夫田穰苴作六國時齊威王大夫又作附於穰苴注家旁加之説何必求合司馬法在孟子明言鄉田同井則鄉田為井可知野九一而助則遂田亦為井可知又曰雖周亦助今人解孟子即以鄭氏畿内用貢都鄙用助為説雖朱集註亦用之楊龜山張南軒皆祖鄭説文公他日答學者又云井地一方溝洫廬舍在其中已是定了先是五十改為七十又改為百一番拆碎一番勞擾聖人處事必不如此看来自古皆是百畝孟子之文固不可刋文公之疑亦所當考徹者透徹之義此自横渠始之畫一井九百畆之田合八家通徹而耕則功力均且相驅率無一家得惰者及已收穫則計畆裒分之文公耕則通力而作收則計畆而分便是用横渠之説先取十之一歸之公上其餘八家共分之此謂之徹年有上下則司稼行野觀稼以出斂法故周之徹法最為盡善度其隰原徹田為糧盖自公劉已然後世特遵而守之耳豈周公方行是法哉吾故曰周天下通用井田也雖天下通用井田而王者只据千里之内自治其田故整然易易而無貧富不等之民好處又是溝洫畎澮皆有定數又無縁有占田底人如侯國則以王畿為率音律又音類又各自井其田但看魯國便知當時之制如宣公初税畆則自壊其法矣毋怪再變而丘甲三變而田賦也或曰周為井田田有不可井者奈何曰所謂井田其亦可井者井之爾山川陵谷所在有之如不可井則亦計其夫家與步畆之數授之取登足而已何必坦然如一枰而溝洫縦横於其上乎經生説經必欲畫地為圖四方平正以就死法故其為説例皆互異不能自通於是立井田溝洫異制之説又不通則以為此商制此夏制皆不足据也若夫兵農之制謂寓兵於農又非治畿之道分田使之耕築室使之居既有以衣食則不可無以自衛於是教之為兵以自為緩急之備故王畿鄉遂之民皆可以為兵周公以仁天下為心只就它身上理㑹調發征行所以用之皆有常數見於經者五家為比即就其中以一家為比長五比為閭即就比長五人中選一人以為閭胥以上族師黨正州長之官皆然非若後世民自為民官自為官也出而為五長兩司馬旅帥師帥之官亦莫不然非若後世兵自為兵将自為将也雖溝洫之夫亦即就用洫夫以為澮夫非洫夫之外又除澮夫也甸方十里當九百夫除去二里治洫則除百八十夫止用七百二十夫出兵車一乗同方百里亦依此法除之正合七家取一兵之法正不必泥鄭氏旁加之説又不必泥司馬法通成終同所出馬車士徒之數為鄭賈之説曰鄉遂都鄙㕘用貢助而制田寓軍則異畿内邦國皆用助法而制田寓軍則同賈公彦又謂邦國亦用貢助考其説畿内用貢畿外用助之不可通者一鄉遂溝洫井田之不可通者二鄉遂都鄙制軍之不可通者三司馬法與都鄙丘乗異其不可通者四采地邦國制軍之異又不可通者五周公經制自周公之經制穰苴司馬法自穰苴之司馬法何至傅㑹牽合自為紛紛哉周官授田制軍之法具於司徒出軍部伍之法具於司馬至簡而至易明也經曰乃經土地而井牧其野止四縣為都此六鄉授田之法上地可任者家三人止凡起徒役毋過家一人此六鄉因田制軍之法推之於遂六遂如鄉准之於都鄙都鄙如遂井邑丘甸與遂人溝洫相包是畿内皆井而用助其地皆井則其軍皆家一人安有鄉遂都鄙之異司徒之比閭族黨指六鄉之地而言出軍之總數司馬之五兩軍師合王畿而言調發之數鄉遂各七萬五千家家出一人各七萬五千人而為六軍之正副此鄉遂居民之實地家稍縣都雖裂為公卿大夫之采邑其地則皆統於鄉遂其兵則皆調於天子小司徒之丘乗縣都是都統於鄉遂人之為鄙為縣是鄙統於遂鄉遂都鄙各家一人為正卒使之守望相助疾病相扶以自衛其生計而已或有調發則合畿内惟起司馬之六軍所以壯國勢而休民力也夫以王畿九百萬夫之地而調發止七萬五千人其重用民力如此疏家謂出軍之法先六鄉賦不止出六遂賦猶不止徵兵於公邑采地不止乃徵兵於諸侯此殆漢唐勞民召釁之事周公之法有是哉有是哉子曰巍巍乎舜禹之有天下也而不與焉章子曰大哉堯之為君也章舜有臣五人而天下治章子曰禹吾無間然矣章子畏於匡曰文王既没文不在兹乎章堯曰咨爾舜章昔者禹抑洪水而天下平章人之所以異於禽獸者幾希章禹惡㫖酒而好善言章王者之迹熄而詩亡章予未得為孔子徒也予私淑諸人也章由堯舜至於湯五百有餘嵗章天下未有無理之用亦未有無用之理語孟兩書雖門人記當時師弟問答之言然句句是理字字是用孔孟憂世正要用世然制於時命卒不見用而用之之志即在泰伯篇末堯曰篇端文不在兹之嘆可以知吾夫子之志矣正人心承三聖離婁四章歴敘堯舜禹湯文武周孔之傳盡心見知聞知之論可以知吾孟子之志矣舜禹雖有天下於己畧無一毫闗涉堯雖如天不可以形容而可見者事業與禮樂法度而已五人九人者臣也雖然必如五人九人者而後謂之人唐虞交㑹之際惟周為盛周之所以為至徳者天命未絶人心未離周猶事殷此豈有與天下之心惟禹亦然吾無間一語尚何得而議之哉後死者而與斯文夫子之自任何如哉一言之不足而又再言之堯咨舜命揖遜之盛也湯武征伐亦喜其應天順人之舉謹權量審法度以下此則吾夫子用世之規也禹抑洪水周公兼夷狄孔子成春秋而孟子之距楊墨敢與之等舜性之者禹以下身之者兼三王施四事周公事也尊周折桓文孔子事也乃曰予未得為孔子徒軻何嘗道及霸者哉見知聞知前此無人説破然而無有乎爾雖不敢自附於見知者之列則亦無有乎爾猶有望聞知者之有其人聖賢之生也不數道統之傳也不偶孔子之道至孟子而始尊然亦至孟子而始孤立戰國與春秋不同時異端恣行與孔子時不同文武周公之澤雖未逺而萬章公孫丑之徒大不及顔曽諸子則傳道之責較孔子為尤難孔子不得為堯舜為文武周公孟子又不得為孔子之徒一聖一賢生不並世皆無用處良可嘆矣道不用則必傳無聖人烏乎傳孔子之傳猶有曽伋孟之傳者誰與同時如荀卿所學所見迴别不到孟子地位歴漢晉隋唐其間僅有一董仲舒識得大意揚子號為尊信孟子然本領差錯他何足觀王仲淹亦為有志斯道者然所學殊無着裏靠實工夫而所言僅影響於形聲之末韓退之原道之作頗知源委然趨向所在亦未免文章之好利禄之求若數子者只是能言傳道而未知所以為道之傳傳且爾用安在雖然斯道之絶續天也亦人也百十年間常有一箇人出而宗主之則斯道氣脈常有生意少有間㫁後人擔當尤為難難所謂宗主之者要必如孟子嚴義利之辨審王霸之途明吾道異端之界限而後可以扶道統否則下為荀揚髙則不過韓退之耳此等擔當亦須剛毅方有力孟子直是剛毅所以扶植得起下之世純是功利儻其間有一好脩之士則私議横生身為儒者亦有時而避道學之名此是大病痛處全在吾黨同心叶力方主張得登斯堂也前修往矣傳之者在諸君子用之者亦在諸君子使後進而亦得與於斯文僕也何幸四如講稿卷二
