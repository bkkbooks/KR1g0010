body:
  text: 四如講稿卷六宋黃仲元撰春秋發題孔子曰文不在兹乎又曰述而不作信而好古又曰蓋有不知而作之者我無是也此夫子述六經之本旨然自陳衛歸魯時年六十八矣而春秋之修獨後諸經他經令弟子編集而後聖人為之裁正春秋決聖人親筆削故遊夏之徒不能贊一辭春秋之名非夫子名之亦非魯史名之古者事為春秋意上古以來皆然特其書不傳爾韓宣子所見周春秋也以魯公紀元魯春秋也夫子所修者是已不然則宣子所見平王以前之春秋東遷以來魯無有矣總一嵗上下而謂春秋此亦天地間自然名字當如此但既經聖人手平心直記言約事實善惡自見無非天理之自然説春秋者於千百載之下而欲逆推千百載聖人之心又恐夫子當時之意或不如此不若以夫子之言斷春秋只把論語一書便自好看堯曰歷敘堯舜禹湯武之傳自謹權量而下皆是王道繩墨名不正則言不順言不順則事不成此是春秋張本八佾一篇多寓微意而不如諸夏之亡一句使人凜然齊晉譎正二字與夫如其仁如其仁之稱微管吾其之歎斷盡伯者功過至謂天下無道則禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出蓋五世希不失矣陪臣執國命蓋三世希不失矣而春秋始中終備矣故有隱桓莊閔僖之春秋有文宣成襄之春秋有昭定哀之春秋自隱之元至僖之末凡九十六年而天下成乎伯主自文之元至襄之末凡八十五年而天下成乎大夫自昭之元至哀之末凡六十一年而天下成乎裔夷世道三變春秋於是終焉大抵春秋一經開卷純是亂世時事王室之盛衰諸侯之離合裔夷之更代在焉世家之始終制度之沿革禮樂之變更在焉天人之應驗氣數之轉移在焉此皆關於世變之大春秋傷之竊嘗以天意觀春秋時正如開賭場相似齊併國多少晉又併國多少楚又併國多少如魯如鄭如宋各有所併恰如賭場中得大小采到得卷盡時併更未了在這世界安得不亂但當時小國介於大國奔命不暇猶足自維持數百年此勢又如稻塍各有界分約束卒不能壞不比後世如萬頃陂要起卒起不得一起遂洶湧更沒奈何自周之東桑之落矣其黃而隕王室之亂凡四猶綿延二十四君不絶如線蓋自平而下皆庸君也雖非大惡而天下之為惡者皆得以肆其惡故中間有許多爭奪周之亡雖緩而當時民生之害亦深又嘗以地氣觀春秋時齊強而伯其氣兆於山東逮河則晉伯宋暫一閧又踰而西穆公盛矣而楚在荆湖南北之間崛強久矣而礙於齊晉晉微而楚伸矣吳興於東南吳興而齊楚二方有難越繼起而吳歇此亦非偶然者又嘗以人事觀春秋時何異一傀儡棚入春秋初諸侯爭閧更無統屬及伯者興方有畏憚齊桓與楚爭一閧而散晉文又與楚爭齊楚之爭不久晉楚之爭甚長然終至於和而後已晉楚方已吳又興矣吳楚既一閧而散越又一閧魯於隱之世猶能令齊桓之世始與齊抗莊閔僖之世常事齊僖之末至文宣常事晉成襄昭兼事楚定哀事吳哀事越閧則與之俱閧散又與之俱散可付一笑夫天運於上先春後秋未嘗一年錯繆而地氣回轉東趨而西西趨而南北之間又趨而東南矣人又陸梁呌號其間紛紛擾擾靡所寧止謂之何哉故二百四十二年間純乎剝者也隂愈進亂愈甚或猶曰春秋之極而有麟焉可以觀性與天道矣吁緬哉邈乎邈乎緬哉春秋為麟而起止乎為臣子而作乎夫子不幸生乎王法不行亂賊橫恣之世筆削魯史之志久矣然猶冀列國之君有能上告天子下告方伯以仗討賊之義至於齋沐之請不從然後知天理民彞將盡泯滅於是不得己修魯史獲麟之事適值其年又當其會而公羊指為夫子作經之證漢儒假托讖緯遂謂獲麟之後得血闕書端門之命使子夏求周史記得百二十國寶書九月而成始於春成於秋杜氏亦承餘竅因謂所感而起所以為止然則當時若不獲麟春秋可無作乎孔子修春秋但書獲麟孟子正人心章明言臣子亂賊孔子作春秋後學不信孔孟而信漢儒此邪説所以壞經也昔胡氏春秋傳成朱晦庵曰直是夫子親出來説方敢盡信僕謂春秋為請討陳恆而作雖夫子再生亦必曰然若夫春秋之終適值衛輒來奔聖人特筆一事於其末此正夫子正名之義讀論語二章自見左氏去孔子之世為近故傳春秋終於此筆得其實也杜學左氏者不信左氏而信公羊以為弟子採托獲麟後事以續夫子之經孔門遊夏一辭莫贊他弟子必不若是謬妄是則春秋之作止也不可不辨五伯五伯之稱有三杜預注左氏曰夏伯昆吾商伯大彭豖韋周伯齊桓晉文趙岐釋孟子曰齊桓晉文宋襄秦穆楚莊荀子王伯篇曰齊桓晉文楚莊吳闔閭越勾踐按史記楚世家昆吾夏之時嘗為侯伯桀之時湯滅之彭祖氏殷之時嘗為侯伯殷之末世滅彭祖氏左氏傳范宣子曰昔丐之祖在商為豖韋氏在周為唐杜氏杜注殷末豖韋國於唐周成王滅唐遷之於杜為杜伯論三代時五伯杜之説非逺而無據謂之伯者天子命之以長諸侯如齊桓晉文亦是周王命之為伯自霸之名立則是以智力把持天下爭雄中國宋襄圖霸不成之君盂之會楚人執之釋之如戲嬰兒是以不得志乎泓何嘗可謂之霸荀卿生於戰國去五伯為甚近其言似足信考之於經吳則黃池之會兩書於越入吳卿之言近矣而未盡也論春秋五伯當以史記為證史記自東遷以前皆紀周事東遷以後雜記諸侯凡齊桓晉文秦穆楚莊一一具載所以見伯與王室相為盛衰遷之言曰平王之時周室衰微諸侯強并弱齊楚秦晉始大蓋為書齊桓晉文秦穆楚莊張本則宋襄之不列於五伯明矣及吳世家却載夫差十四年春吳王北會諸侯於黃池欲霸中國以全周室則五霸合以齊桓晉文秦穆楚莊吳夫差為五此有漢史可證漢史注五伯有三表適成強於五伯師古曰伯讀曰霸五伯謂昆吾大彭豖韋齊桓晉文諸侯王表衰則五伯扶其弱師古曰此五伯謂齊桓宋襄晉文秦穆吳夫差地理志舂秋時五伯迭興師古曰此五伯齊桓宋襄晉文秦穆楚莊今以春秋始末考之合以夫差與桓文穆莊為五今考春秋齊之霸以僖九年葵丘之會而盛晉之霸以僖二十八年踐土之盟而盛秦之霸以文三年焚舟之役而盛楚之霸以宣十二年邲之戰而盛吳之霸以哀十三年黃池之會而大故莊僖而後政出齊晉聖人書法自是一變文宣以來權在秦楚聖人書法自是再變吳自成七年伐郯始見于經自是而後聖人書法又三變矣蓋至於黃池之會而極春秋所以以是終焉雖然春秋經於文三年第書秦人伐晉何嘗有一大盟會霸諸侯誰謂春秋而與秦霸邲之戰晉師大敗以夷狄而敗中國之師此春秋之所深痛誰謂春秋而與楚霸諸侯泯泯制命在吳吳之會莫盛於黃池而其亡也亦自黃池之會誰謂春秋而與吳霸秦楚吳皆夷也説春秋者只當論齊晉二伯不當言五伯賔媚人言四王之王五霸之霸孟子言五霸三王之罪人是合三代時説夫子曰齊桓公正而不譎晉文公譎而不正此二句固是二伯斷案然筆削之際明示萬世法戒略不少假於二伯葵丘踐土例書曰盟則盟誓豈仲尼之所取而其罪又在於致宰周公與召天王當周不競所賴扶持王室者二伯也小白不朝重耳召狩春秋又何望哉誰謂春秋而與齊晉大抵春秋借事明義有可以為人君之訓者有可以為人臣之訓者有為人父立法者有為人子立法者不明此義區區計二伯之優劣與謂春秋為五伯之刑書者皆非深知春秋者也易書詩春秋經者載道之書亦論世之書讀經者不論其世可乎儀禮非完書樂缺逸無傳六典或疑為莽之事歆之文禮記又雜出漢儒之采綴且以易書詩春秋言之子曰作易者其有憂患乎此一句是易中總腦處乾姤坤復泰否既未隂陽回旋民生與焉這是世道大憂患伏羲先天一圖勘破於冥冥倚伏之中但未有文字寫出文王繫彖辭便思所以處天下之憂患明夷又自處一身之憂患周公繫爻辭有吉凶有悔吝又一爻有一爻之憂患夫子十翼觀變玩占又是教人處憂患學者讀易反身修德思憂防患於乾當恆易以知險於坤當恆簡以知阻乾之惕厲亢悔坤之堅氷戰野一一是處憂患六十四卦皆當如此看盡觀六畫默參人事泰與既濟把做堯舜禹湯文武成康時看否與未濟把做春秋戰國時看乾之姤把做晉與三十國與唐宋五代時看坤之復把做秦漢隋唐交接時看方會得環中意有天下者善變之則否為泰未為既姤為復坤為乾矣書於虞夏渾渾商灝灝周噩噩氣象自是迥别時世亦大不同堯不能無水患舜不能無征苗甘之誓逆境也洛之畋危機也鳴條之師又一亡一存一廢一興矣太甲桐居前此所無盤庚五遷澒洞幾不可掇祖甲立而周文已生微子遁而天命既錯矣武告成箕陳範前忘後繫既有所屬三監淮夷之畔猶多外懼內憂卜澗卜瀍方歸奄多士多方不作頑者猶未必格忱者猶未必勸錫晉圭瓉雖存周舊東遷於此乎始二誓之録非望魯也非喜秦也傷周之不復興也試自堯典至文侯之命商略古人所以處興亡盛衰之變大抵有人則濟無人則否臯夔稷契伊傅周召輩人天之生不數數也詩以變風繼二南家道之失常也列衛而著邶鄘吞併之始也諸侯相并則無周鄭與王俱東故王鄭次之周一東而齊晉迭伯齊先晉後晉衰秦伯秦歇楚興滅陳而縣故齊魏唐晉陳又次之詩亡而亂極鄶曹所以思治亂極而治必有救亂者出救亂而歸之正故豳為變之終雅之始文武憂勤者也成王持守者也六月諸詩雖中興之基亦易衰之漸節南山以下由朝廷而四方既先慢其經界又併與禮樂刑政蕩然棄之漸漸之石苕之華何草不黃尚忍言哉卷阿後唯雲漢嵩髙蒸民韓奕江漢常武略有興復規模以后稷公劉數世積纍之艱難宣以前厲壞之宣以後幽壞之故幽之後無雅成之後無頌聖人序詩蓋專為西周設也詩亡然後春秋作春秋始周鄭中齊晉終楚吳越入春秋魯最強大猶能令齊桓而下齊魯始抗莊閔僖之世魯常事齊僖之末至文宣魯常事晉成襄昭兼事楚定事吳哀事越鄭介於齊晉楚之間齊始伯晉次伯鄭奔命二伯國與楚之不暇齊晉與楚為敵者齊晉衰而楚強楚微則吳盛吳弱則越大晉之伯異齊逺甚桓之正尊王室文之譎微王室無桓周滅有周桓賊桓卒伯衰周之不幸以桓之不幸也桓之不幸以管仲之不幸也雖然隱桓莊閔僖之春秋此一時也天下成乎伯主者九十六年文宣成襄之春秋又一時也天下成乎大夫者八十五年昭定哀之春秋又一時也六十一年間世道大變而春秋亦異論而至此易不必説九六説蓍衍説象數須曉得世運未有純陽而無隂之時亦未有純隂而無陽之時氣化相禪豈人能測書不必説制度説禮樂説政刑須曉得商革夏周革商是一大盛衰三代中間凡幾變故又是小小盛衰此幾至可畏也詩未便説比賦興説鳥獸草木且看如何是二南時詩如何是變風時詩如何是幽厲時詩畢竟有箇大關涉處春秋未便説夏時周月説名氏地理且看春秋有齊晉時如何畢竟是一犬斷案合而觀之天地中間治日常少亂日常多人事得失趨亂常易趨治常難書之秦誓即易之未濟也詩之王風即書之文侯也春秋之魯隱又詩之自幽王以後也天時迭為消長聖經更為汙隆時之既往億千萬年時之未來億千萬年聖經無一日而不在天地間各有生長收藏使有通乎四經者古今之在天地間只一旦莫天地終乎終安知天地不始乎始亦可因斯文而觀世變矣經史夫子未生之前易詩書禮樂有之矣春秋則魯史之舊也夫子生於魯襄公二十二年初自齊反魯時年四十三自衛歸魯時年六十八矣乃敘書傳禮刪詩正樂序易彖繫象説卦文言及庚申西狩始修春秋則夫子經成於暮年易最後春秋又其晚筆然聖人述作之意盡在魯論二十篇作者七人所以推原前聖創始之由述而不作不惟不敢當作者之聖而亦不敢顯然附昔賢之列吾不試故藝言道不見用於當時故修六藝以詔來世小子成章不知所裁此為著述而發子所雅言詩書執禮此欲定四經時語語太師樂雅頌得所關雎之亂不淫不傷三百一言曰思無邪此正刪詩時語泰伯篇末堯曰首章歷歷敘堯舜禹湯文武之盛此蓋定書時語杞宋文獻足則能徵周監二代郁郁乎文在齊聞韶武未盡善明禮正樂於此乎見加我數年五十學易河不出圖吾已矣夫文王既沒文不在兹贊易十翼於此乎始告公與二三子適值獲麟之嵗於是志在春秋矣禮樂征伐自諸侯而大夫而陪臣三桓之子孫微齊晉之正譎此又修魯史時語而時輅冕舞又損益以為百王大法夫子之旨深乎哉惜也年運既往生不留今秦之焚民間書耳項之炬博士所藏燼矣詩則後儒以聖人之所刪者雜之書百篇而亡其半禮逸而以小戴書官待世樂咸無焉易有墜簡有脫字春秋經文殘缺可疑於是六經遂為不完之書然禮樂與易經也而詩書春秋史而經也闕其疑而守其信是在善學者之自得耳矣四如講稿卷六
