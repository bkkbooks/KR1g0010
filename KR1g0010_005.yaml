body:
  text: 四如講稿卷五宋黄仲元撰春官大卜掌三易之灋一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四簭人三易同周官作於周公畢竟是時三易俱存用則參而用之古者三人占則従二人之言也杜子春云連山伏羲歸藏黄帝鄭易贊云夏曰連山殷曰歸藏又注禮運記坤乾云其書存者有歸藏孔正義先言坤者熊氏殷易以坤為首大卜賈釋云今歸藏坤開筮帝堯降二女為舜妃又節卦云殷王其國常母谷子春意伏羲黄帝造其名夏殷因其名以作易皇甫謐記亦云夏人因炎帝曰連山殷人因黄帝曰歸藏賈又云夏殷易以七八不變為占周易以九六變者為占連山以純艮為首艮為山山上山下是名連山雲氣出内於山歸藏以純坤為首坤為地故萬物莫不歸而藏於中周易以純乾為首乾為天天能周匝於四時故名易為周必以三者為首取三正三統之義人無為卦首之理艮漸正月故以艮為首周易孔正義引世譜等書神農一曰連山氏亦曰列山氏黄帝一曰歸藏氏既連山歸藏並是代號則周易稱周以别餘代大抵不出三説一伏羲黄帝二夏殷三神農黄帝愚按張衡靈憲嫦娥竊藥奔月筮之有黄有黄曰吉翩翩歸妹獨將西行逢天晦芒毋驚毋恐後其大昌羿為夏人所用連山易也此其爻辭乎又按爾雅釋畜疏曰歸藏者成湯之所作是三易之一兩壺兩羭齊母經瞿有之文此其爻辭乎然隋儒林傳以劉光伯所上送官連山易為偽意義甚淺隋經籍志以長孫無忌等次歸藏書為多訛缺但有初經齊母本著三篇初經則初奭坤初乾初離初坎初兑初艮初釐震初奭巽是也則是二易者秦項二火之後好事者偽為之必矣又嘗質之家語子曰我欲觀殷道宋不足徵吾得乾坤焉此書雖疵雜然乾坤一語亦自明白小戴惑於三易之説迺易乾坤而為坤乾又不知夫子所得者如賈疏所載歸藏之筮與爾雅之文否賈釋三易皆以乾坤震巽坎離艮兑為本則家語之言為正昔元豐中毛正仲得南陽逆旅書以山氣形為三墳人皇神農氏歸藏易一曰天氣歸二曰地氣藏地皇軒轅氏坤乾易一曰乾形天二曰坤形地説者猶曰假羲炎黄帝為言以遷就孔説則夫子所得殷易亦必首乾次坤特三代久逺書多遺落今不可得而考耳或又曰首艮者以艮為首法爾法其止而不變首坤者以坤為首法爾法其静而不變非首易之書也易者變易之易不變何足以言易凡變之占以所變之爻為占不變之占以所不變之爻為占周人以三易參而占之非不用也雖然周易一部吾輩讀猶未曉又何必求連山歸藏哉説卦傳天地定位山澤通氣雷風相薄水火不相射此乾坤變化自然之序而文王因之雷以動之風以散之雨以潤之日以烜之艮以止之兑以説之乾以君之坤以藏之此先言六子而後及於乾坤乾以君之則言萬物之所本坤以藏之則言萬物之所歸而殷人因之便是歸藏易謂神農因之亦可也帝出乎震齊乎巽相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮此五行相生之次水又生木艮止其所而後出乎震則不終止而夏人因之便是連山易謂黄帝因之亦可也二易皆本乎伏羲但世不見古書爾又何必外求連山歸藏哉夫子此傳正是三易凡例第近世講師弗之深考故學易者看人落處何如不知落處明安得用處活易正未易讀也亦未易用也離坎古無周易之名後儒以為經文王周公之手故曰周卦畫於羲專謂之周可乎易之一字象形而制上日下月日之象圓月有盈虧此則陽全隂闕之理合而明易便是一隂一陽之謂道便是變易之易日月是天地之易未有易書之前只有天地日月既有易書之後不出乾坤坎離今六十四卦是聖人之易乃易書也又不知誰名此為易邪一畫為陽二畫為隂三畫既成陽不可得而名强而名之曰乾隂不可得而名强而名之曰坤乾坤非天地也又强而訓之曰天地取義之健順也乾坤且强名之離坎之名又従何而生乾再交坤而為坎坤再交乾而為離則乾坤為父母而離坎其子也天地既判日便生焉纔有日則有月月乃受日之光若非日月光明天地都晦昧了萬物何従而觀化哉易書八卦取象曰天地水火風雷山澤似專以一象言之而説卦取義甚廣於離言日於坎言月則離坎非獨象水火也離如何為日外兩畫陽故明内一畫隂故暗日象坎如何為月外兩畫隂故暗内一畫陽故明月象盖陽根隂隂根陽之義宿禽之法於房曰日兔於畢曰月烏房東方宿日以兔言陽根隂也畢西方宿月以烏言隂根陽也兑即離傳坤母之體坎承乾父之氣而生也大傳又曰日月運行一寒一暑剛柔者一晝一夜之象隂陽之義配日月縣象著明莫大於日月天地之道貞觀者也日月之道貞明者也日月相推而明生焉夫子都是藏坎離説時人不識凡例耳又曰天垂象聖人象之上象字是日月下象字是易日之象圓月之象盈虧易之名所以象之又曰乾坤列而易立乎其中乾坤毁則無以見易易不可見則乾坤或幾乎息矣乾坤即天地也易即日月也若易不可見則邵堯夫所謂閉物之時矣伏羲對待之卦其方位則離東坎西為日月出入之門入用之卦其方位則離南坎北為陽明隂晦之地文王之卦則上經三十卦乾坤言其位之對泰否言其氣之交終之以坎離則乾坤之用下經三十四卦震巽艮兊俱言隂陽之交而終之以既濟未濟又坎離之交不交也上經除乾坤泰否坎離六重卦外下經除震巽艮兑既未六重卦外中間上經八乾八坤下經四乾四坤其為乾坤也各十二上經六坎四離下經八離六坎其為離坎也各十二合上下經震巽之為卦各十四艮兊之為卦各十四無非天地自然之數乾坤天地也坎離日月也震巽艮兊四時之序也坎離行乎震巽艮兑四時之間然後三百八十四爻備焉故於嵗之閏象之此易字所以日月取義而坎離又有功於六卦也夫子贊易各有凡例開卷即是乾卦而於彖傳首曰大明終始六位時成此以日月往来言也於文言又曰大人者與天地合其徳與日月合其明與四時合其序日月即坎離也至於離卦彖傳又曰離麗也日月麗乎天信乎日月不可一日無也離主日坎主月今於坎大象不言月何哉此又崇陽抑隂之意周公爻辭中孚六四曰月幾朢月不取盈而取其近於朢盖防盛滿之極也中孚之四巽卦之初猶曰隂自坤来故曰月小畜之上乃巽卦之極而亦言月幾朢此以變卦例言也陽變則隂巽上九變則為坎之上故亦言月明夷一卦日入于地則失其明周公爻辭獨以五為箕子之明夷夫子彖傳又曰文王以之盖論全卦體則内文明外柔順以蒙大難此文王事也專論五爻則内難而能正其志惟箕子當之卦爻之義自不同也或曰説離坎必説乾坤今舍坤而不言者何曰坤下卦上爻辭曰六三含章文言曰天地閉賢人隠坤純隂也隂月象也下卦之上隂極矣月載魄矣不含章乎上卦之下月未生明則晦之日也天地其不閉乎易不可為典要讀易者拘文義則失矣乾為六十四卦之首回頭更看乾卦九三爻下卦之上日將夕矣周公爻辭乃曰君子終日乾乾夕惕若着兩乾字今日之日將往明日之日又来君子其可不自强不息乎故夫子於易大象曰明兩作離正是乾乾之義吾輩各自悟入可也一隂一陽之謂道隂陽以氣言道以理言形而上者謂之道隂陽則形而下者也隂陽非道也所以一隂一陽者道也一隂一陽猶言一出一入明隂陽之迭運也惟迭運故先言隂後言陽是就静處論起之謂兩字與謂之兩字不同凡曰謂之者其辭直曰之謂者其辭婉形而上者謂之道此之字特語助也言至理之妙超出乎萬物之表即此便喚做道一隂一陽之謂道此之字則指隂陽而言言二氣之運不離乎此理之實即隂陽則可以言道正如乾陽坤隂陽開隂合闔户便喚做坤闢户便喚做乾所以曰闔户謂之坤闢户謂之乾至於乾始物而有象則所以成象者乾然指成象便為乾則不可坤成物而取法於乾則所以效法者坤然指效法便為坤亦不可所以成象之謂乾效法之謂坤吾觀隂陽變化升降八紘中動極而静静極復動所以一動一静者誰實使之然歟往者必来来者復往所以一往一来者誰實使之然歟太極也太極生隂陽隂陽一太極隂陽只是隂陽道便是太極理無間斷故氣亦無間斷理無止息故氣亦無止息有此理方有此氣知此氣則可以知此理故曰一隂一陽之謂道隂陽二字有以對待言者有以流行言者此一句兼對待流行而言纔説對待便有流行底意隂陽流行天地間陽可剥而不可盡隂亦可夬而不可盡時當九月其卦為剥上九一畫分為三十分一日剥一分至九月末方剥得盡然剥於上即生於下無間可息纔交十月節陽氣一日便生一分即三十分而成一畫至十一月則此畫始成而為復所謂陽者未嘗盡也惟隂亦然時當三月其卦為夬上六一畫分為三十分一日夬一分至三月末方夬得盡然夬於上即生於下亦無間可息纔交四月節隂氣一日便生一分即三十分而成一畫至五月始成而為垢所謂隂者亦未嘗絶也人但知陽復於子而不知陽已生於亥之初知隂垢於午而不知隂己萌於已之初故十月隂雖用事而隂不孤立此月純隂疑於無陽故謂之陽月四月陽雖用事而陽不獨存此月純陽疑於無隂故亦謂之隂月建己之月為純陽不容都無復隂但是陽家用事陽氣之極耳建亥之月為純隂不容都無復陽但是隂家用事隂氣之極耳葶藶枯於盛夏欵冬花於嚴寒水極隂而有温泉火至陽而有涼焰故知隂不得無陽陽不容都無隂大扺純陽純隂雖在四月十月只月中之一日耳純陽用事是未夏至一日純隂用事是未冬至一日然氣化推移一消一長之間隂陽於是乎有争矣仲冬之月隂極生陽之時也月令曰隂陽争仲夏之月陽極生隂之時也月令亦曰隂陽争盖五月之垢六陽方盛而一隂相遇正如滿堂君子而一小人突如其来此所以不能無争七日之復六隂方極而一陽来返正如滿堂小人而一君子于焉而歸所以亦不能無争盖陽盛則勝隂隂王則勝陽隂陽交戰謂之争所謂争者非有所摶擊非有紛競非有鬭怒突蕩而㝠㝠之中氣候忽己轉移矣争則争矣孰知一隂一陽者天道之運扶陽抑隂者君子之心當陽氣方歸而未壯君子則静以養之是以仲冬之月齋戒掩身身欲寧去聲色禁嗜欲安形性事欲静盖聲色嗜欲皆隂類也去之禁之皆所以抑隂而助陽也至於隂氣方進而未定君子亦静以鎮之是以仲夏之月曰齋戒掩身矣又曰毋躁曰止聲色矣又曰毋或進薄滋味矣又曰毋致和節嗜欲矣又曰定心氣百官静事矣又曰毋刑無他聲色嗜欲隂類也滋味刑威亦隂類也所以諄復致戒視仲冬為加詳者盖陽長之時其扶陽抑隂也易為力若隂長之時則抑隂扶陽也難為功又嘗論仲冬之月既欲静以待隂陽之所定仲夏乃獨曰以定晏隂之所成何耶陽来之時陽氣日長一日而陽能容隂如君子能容小人惟静以待之則隂陽終有時而定故曰以待隂陽之所定隂生之時隂氣亦日盛一日而隂不能容陽如小人不能容君子其争也無所不至矣所以獨於此隂也既欲定之又欲晏安之庶幾隂氣有所成就而不至於傷陽也故曰以定晏隂之所成謂之待隂陽之所定是隂陽将自定也謂之定晏隂之所成是隂氣非人不能定之也陽氣生則養之以待其定隂氣生則加意極力以定之古人扶陽抑隂之意可見矣吁㣲矣哉周易下繫傳第二章黄帝堯舜氏作通其變使民不倦神而化之使民宜之窮則變變則通通則久是以自天祐之吉无不利黄帝堯舜垂衣裳而天下治盖取乾坤孔穎達正義曰垂衣裳者以前衣皮其制短小今衣絲麻布帛所作衣裳其制長大故云垂衣裳取諸乾坤者衣裳辨貴賤乾坤則之上下殊體周禮司服注疏云凡冕服皆𤣥衣纁裳乾為天其色𤣥坤為地其色黄但土無正位託於南方火色赤赤與黄即是纁色故以纁為名胡安定曰乾以陽剛之徳在上故為尊坤以柔隂之徳在下故為卑故作衣裳以分尊卑上下貴賤之等此盖取諸乾坤之象黄帝堯舜連言之者盖衣裳之起始於黄帝成於堯舜之時蔡節齋曰乾上坤下垂衣裳而治之義朱漢上曰十三卦皆取重卦之象垂衣亦兩象陳樂軒曰書曰予觀古人作服則舜之所謂十二章者自黄帝以来有之矣或曰十一卦皆止就一卦取象獨乾坤合二卦言者盖假借乾坤十二爻作一象以定上下之分非是一乾一坤為兩卦乾在上六畫古制衣六幅坤在下十二畫裳分左右古制裳十二幅荀爽九家集解説卦乾為天章後有四一為衣坤後有八一為裳意中古及漢儒亦有合乾坤作一象而觀者後世諸儒析之若析二卦作兩處看是一箇人着衣一箇人着裳煞是礙理愚謂此章義在變化不在衣裳十三卦為上下二篇之凡例而乾坤又為十二卦之綱領伏羲時但有隂陽之畫未有文字可傳何有卦名邪但既有此象便有此理聖人制器不待見卦而後知象而義自與象契盖者疑之之辭取諸乾坤者盖取其義非取其象與名也何謂取諸乾坤之義為治之道無他通其變而已曰通其變使民不倦者上古風氣未開民淳事簡及其既開人事迭變日趨文明聖人若不隨時制作以通其變則人之視聴必倦惟通其變人事愈新斯民亦改聴易視樂於其中而無厭倦矣如下文舟楫服乗重門擊柝臼杵弧矢皆變通之象夫生民日用之具非一人一日之力自無而有自簡而詳愈作愈備雖聖人而不可知之神實則猶造化神明之徳故民利用出入而彼自不知其所以然而然者既不知所以然而然則所作用皆得其宜也易一字句絶窮則變變則通通則久此九字三句絶盖易為道既變動不居則不應更有窮時但遇窮則知變爾既變則自通通謂行而無窒久謂與天地相為長久宜乎自天祐之吉无不利此引大有卦上爻為證如此則三聖人者垂拱於廟堂之上而天下自治矣若謂着一通衣裳坐於人上可能致治甚是無義然則取諸乾坤者何曰乾極陽坤極隂是以乾坤至於六爻之極必有用九用六之文所以明其變通變神化取諸乾坤所以法其變惟通故神惟變故化通變神化不是兩事但通其變猶有些子着力到神而化便是効驗處其字與而字自有淺深在箇裏不倦與宜之四字亦然這一節上繼往古下開方来正是過闕處黄帝堯舜便是㑹用這易所謂存乎其人是也易大象易更四聖陽畫俱參隂畫俱兩伏羲易也六十四卦彖辭文王易也三百八十四爻辭周公易也上下經彖曰大小象曰繫辭上下傳文言説卦序卦雜卦孔子易也備矣易有此理便有此用在聖人有聖人用在賢人有賢人用學易者須能用易繫辭下傳舉離至夬十三卦無非聖人前民用之事舉履至巽九卦又無非聖人教人處憂患之事易道甚大百物不廢政未易學況用乎學者學易用易當從何入曰先看大象易有聖人之道四居則觀象玩辭動則觀變玩占居則學易動則用易六十四卦三百八十四爻皆如此看又看大象之辭無一非理無一非用又未説到變占處象者像也每卦有上下故各取二象曉得説卦八象便曉得大象只是八象合做將去天象乾地象坤雷山澤於震兑艮皆然水象坎又為雲為雨火象離又為日為電風象巽又為木夫子合二卦象係以象曰又俱以人事取卦義此是教人用易故六十四象曰着六十四箇以字以之為言用也言先王者七言后者二或專言大人或專言上其言君子者五十三有以在上言者有以在下言者有通上下言者皆體易道以為用而最切學者己分上事卦十有八赤子之心譬如蒙泉従山下出源頭一㸃活水清清泠泠地欲充之須是果吾行欲浚之須是育吾徳又如升木従地中生竹萌土裏迸出其進自然雖尚小在日長一日不覺髙大揠之助之非順也暴之寒之非積也蒙象看下字出字方看果字育字升象看中字生字方看順字積字又看小字育到果處方實小處不着工夫小何會髙大未也尊徳性必自道問學中来問學正要涵養不要表襮如風在天天大風小風以小物而蓄於大物之中無形無迹人孰見之乃柔行巽入於太虚之内此學遜志修乃來之義故以懿文徳懿字心最小徳要大心要小文徳只是徳之英華發外處如天在山天大山小天以大物而蓄於小物之内無圭無角人莫識之而草木生意各具一天此有若無實若虚道理故以多識前言往行以畜其徳前言即前聖之言往行即往哲之行多識方見大處愈多愈蓄初不自知其大未也一邊學問又一邊下克已工夫人不能皆聖人也安能無欲安能無過安能一一皆合於理君子之大壯莫若非禮勿履故取雷在天上之象君子之損不善以益至善莫先於懲忿窒慾遷善改過故取山澤風雷之象雷在天上恐懼修省之際此時此心千私百邪浄盡冰釋獨有天理横在胸次一或非禮斷斷弗履不亦强哉矯乎山静澤清吾之本性忿或起之如山之髙慾或誘之如澤之深一懲一窒是謂損之又損風烈則雷迅雷激則風怒二物盖兩相益纔遷善即改過既改過隨遷善迅烈無留益自外来矣未也一言一話一飲食之㣲事至近而所係至大慎言語所以慎其出節飲食所以節其入山止物而雷動山下有物人之口最好動故喜言語嗜飲食而失其所以養大體矣觀頥象者觀其自養耳雖然有身則有家正家之道在正其身正身之道以誠為本火生者木木為火父風出於火火者風母譬家人然此象全在一自字上自者所由出之地誠其所由出也誠矣發此言件件皆實著之行事事有度或誠於始而不誠於終又非恒乆之道雷以時而發聲風以時而順候相與無違何嘗差爽所以為恒立者守固之謂君子之地方者止所之謂君子之止精神又在不易字上惟不易故恒方能思不出其位位即止其所止也止慈者父之位止孝者子之位思不出其位則為無邪之思否則踰分非據上下二艮此為兼山止而又止如何又着一思字止不是塊然不動思處常在但思不敢過其分是謂止雖然身之所接有順有逆處順易處逆難何謂逆大過蹇困否坎之時是也水生乎木常也澤至滅木此水之大過乎常水吾能囘狂瀾於既倒然後獨立而不懼吾不與萬物而俱流然後能遯世而無悶所謂大過人之行者天下非之而不顧舉世不見知而不悔天下一人而已山上有水前陷後阻又何時哉行有不得者反求諸己積於徳者世不能亂反而愈修如臨如履他奚遑恤蹇既險而不能前困又涸而不能濟天地中間豈有常無水之理君子亦豈有常困之時委大命於當然致命也遂吾志之當為遂志也命在天者一毫人力不可加其間志在我者若厄窮時一切放倒斯無成矣澤涸猶可隂陽鬱而不交可乎哉不交則閉四海一君隠将焉之處約養晦殆庶乎免惟能忍天下不可忍之窮斯能辟天下不可辟之難窮之不忍難之是辟辟未幾而誘者至害隨之矣儉徳二字正如藥方相似不可榮以禄辭斷斷其嚴乎雖然遇險而思出險者又當何如人心惟危變詐層出矧居危俗易與為非一重險成二重險於水洊至之象似之君子則不然常吾徳行而已豈以險夷而改節前侯後𤓰吾之為吾者自若習吾教事而已豈以風雨而廢學陳蔡絃歌吾之為吾者亦自若不二三之謂常熟温尋之謂習常如坎信習如坎重惡乎而不進徳雖然學在我教則以善及人之事此講彼習於是樂莫樂乎朋友兩澤相麗則水泉交潤而互益二友相資則教學説樂而相親兑者説不言説而言兑豈呻其佔畢以為説哉雖然志不足以帥氣其説也暫日知其所亡月無忘其所能其説也久健乾徳下乾亦乾上乾亦乾乾乾相繼而不息故久之行也健行健者天之乾乾自强不息者君子之乾乾此易開卷第一卦象不言乾而言健者前百千億萬年後百千億萬年此乾之運晝復夜夜復晝者健也不健則息矣君子亦惟自强故不息堯舜汲汲禹湯文武皇皇孔子俛焉孳孳此是聖人之乾乾弗得弗措弗明弗措人十已百人百已千方是學者之乾乾乾乾則聖矣聖則天矣儻學易而不知用諸我觀象而不知取諸身奚學為昔有記學易堂者首尾俱不言易獨言朝夕飲食起居動作之事或問何不言易其人舉手推去曰這便是學易到此方知一部周易只是注脚前修或由理悟入或由數悟入學者觀象其可無悟入處哉四如講稿卷五
