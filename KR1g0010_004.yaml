body:
  text: 四如講稿卷四宋黄仲元撰詩二南詩與他經不類皆𨽻於聲南古樂名季札觀樂使工為之歌周南召南及見舞象箾南籥者南籥與武濩夏韶等周南召南皆依其本國歌所常用聲南籥自是文王樂周南召南自是周南召南之聲鼓鐘詩以雅以南劉氏釋曰南如周南之南則南與雅對正合詩中樂詩之名曷謂周南召南周召古地名鄭氏譜周召禹貢雍州岐山之陽地名是也岐地江漢汝水皆在其南自周以南近於東故江漢為周南諸國之地召南近西有江沱無漢汝故江沱為召南之地二南之詩非出於一國或得於周南諸國則總曰周南或得於召南諸國則總曰召南而其詩各從二南之聲故樂章以南名之非徒詩也樂記曰武三成而南四成而南國是疆五成而周公左召公右則周召之地為二公采邑而非因二公名也牽於二公之説者誤矣儀禮鄉飲酒鄉射燕禮工歌間歌笙終皆合樂周南闗雎葛覃卷耳召南鵲巢采蘩采蘋燕禮又有房中樂鄭氏註曰絃歌周南召南周禮樂師凡射王以騶虞為節大夫以采蘋為節士以采蘩為節皆視樂奏而為作止泥於風雅頌之名者亦誤矣大抵二南雅頌三者皆聲古人歌詩以聲為本以聲歌詩則亦以聲類詩二南之詩作者固不止一人而纍纍乎貫珠若出一手自麟趾以上應於闗雎凡十一詩皆周南聲自騶虞以上應於鵲巢凡十四詩皆召南聲子謂伯魚曰女為周南召南矣乎為與不圖為樂之至於斯之為字同有作之義則翕純皦繹有器與聲非但歌詠而已曰闗雎之亂洋洋乎盈耳哉曰闗雎樂而不淫哀而不傷盖言樂之聲未嘗言詩之文義古樂不存㑹詩者少詩非章句膠之也有汲新之法焉其聲一吾以正通之周南自周南召南自召南其聲别吾以曲通之二南又就合樂看二南諸詩槩出於小夫賤𨽻婦人之言明白易見大率三章四章一章大率四句辭俱重複相類流之采之芼之與居之方之盈之此直換韻耳琴瑟友之鐘鼓樂之與百兩御之將之成之詩人所言止此必有言外之意麟趾三言于嗟騶虞兩言于嗟于嗟乎騶虞與于嗟麟兮句法㣲别麟趾三章首尾皆以麟形容之意味又最深逺其音韻尚可求也每謂讀周南闗雎詩未作后妃看且按詩文作窈窕淑女看到麟趾詩説公子却作公子看又未作王者之瑞看讀召南鵲巢詩未作夫人看且按詩文作之子于歸看到騶虞詩却就于嗟乎騶虞一句看又未作文王之囿看盖二南之詩必古諸國之詩非特出於文王之世又不可以后妃夫人為拘盡撤諸序專讀本文到自家不知手舞足蹈處方為有得若泥於文王何彼穠矣一詩當作何解若拘於后妃卷耳懐人樛木君子又作何訓細把二南篇篇看過又看闗雎鵲巢夫婦人倫之始二詩夫婦之始闗雎不言后妃而為后妃之徳宜如闗雎鵲巢不言夫人而為夫人之徳宜如鵲巢斯興於詩者也看了二詩只看闗雎衽席至㣲也亦至顯也毋謂言不足忌有耳屬于垣者毋謂屋漏不足媿有相在爾室者此詩又為國風之始二雅之始頌之始然觀詩不必拘泥大學中庸引詩觸類借用豈必與詩意盡合苟有㑹意自然感發讀闗雎只作闗雎解詩豈善讀詩者僕每謂至求之不得寤寐思服悠哉悠哉輾轉反側掩卷再四深省我輩領此意否淇奥賓之初筵抑學欲切思欲近六經皆然詩較切近父子之親君臣之義夫婦之别長幼之序朋友之信詩皆道其常而傷其變學者不於此感發良心善性而思以盡天倫之重所謂切近果何等事雖然切莫切於身近亦莫近於身君子所貴乎道者動容貌也正顔色也出辭氣也三者不謹其何以行此五者哉嘗誦其詩尚友古之人於衛武公三詩而有得焉看三詩當作三節看賓之初筵是武公悔過時節抑詩是武公修徳時節淇奥是武公成徳時節賓筵是武公自悔之詩抑是武公自戒之詩克治之功愈精而愈深存養之學愈敬而愈嚴其所以克治者只在威儀言語上其所以存養者只在謹獨上淇奥是衛人美武公之詩所以形容其威儀之可則言語之可法而深歎其盛徳之至自克已存養中來也細看賔筵五章即是兩節上兩章言古者飲酒惟射與祭祀始如此終亦如此下三章言飲而失徳威儀於是乎諐言語於是乎妄抑詩十二章初言修身謹言之方中言謹獨修徳之事末言聴諫之切一節𦂳似一節盖人有循規蹈矩而或至於失色失足者酒困之也人有訥若不能言而或至於失口者酒亂之也發彼有的以祈爾爵此射時飲酌彼康爵以奏爾時此祭時飲使專若斯時也何害於飲今未醉止反反抑抑迨既醉止幡幡怭怭盖已失其常度矣弁俄而側舞僛而傞載號載呶匪言而言謂之何哉此賓筵所以因飲酒而悔也飲酒孔嘉維其令儀將之以其徳庶乎非禮勿動由醉之言俾出童羖恐之以必無庶乎非禮勿言此詩醉者之狀形容盡矣武公飲酒寧至斯極自悔之辭乃至於此亦謂人之為人以言有物而行有常也少或顛倒謬誤不狂則妄尚得謂之人與想武公是一箇樸訥底人亦是一箇明決底人未至齊聖温克地位飲酒不無㣲愆纔覺便改觀三爵不識矧敢多又兩句則知武公非湎于酒而能剛制乎酒矣武公之不敢過于酒者正欲其修徳也徳内也威儀言語外也制乎外所以養其中抑之戒又嚴矣一章曰敬慎威儀維民之則盖誠足以感人者言動之毋自欺也三章曰顛覆厥徳荒湛于酒盖荒湛于酒則屢舞矣醉言矣於徳乎何有四章曰洒掃庭内維民之章衽席之上苟有慙徳閨門之邃苟有戲言皆非洒掃庭内者也用戒戎作則又干戈省厥躬也至五章曰斯言之玷不可為也六章曰無易由言無曰苟矣言之不可不謹又如此雖然威儀如之何而敬出話如之何而謹其道自謹獨始視爾友君子輯柔爾顔不遐有愆此猶畏謹於手目指視之時也相在爾室尚不愧于屋漏無曰不顯莫予云覯讀至此章此大學正心誠意之極功中庸戒懼不睹聞之地而武公能之則亦聖賢之徒矣言之不足又屢言之辟爾為徳俾臧俾嘉淑慎爾止不愆于儀臧也嘉也皆善也止止其所也不愆不踰則也大學所謂止至善者也徳之所以止至善者温恭其本也故曰温温恭人維徳之基武公之徳有自來矣末三章猶拳拳納誨不以老耄而已于學何哉盖徳之不修武公之憂過之不聞亦武公之憂靡哲不愚聖狂之分甚可畏也反覆一詩曰昊天孔昭公之心與天出王㳺衍也曰神之格思公之心與神洋洋左右也曰㒺敷求先王曰質爾人民曰謹爾侯度公之心又惟恐不合乎古人而無以為四方訓也一邊作克治工夫一邊作存養工夫俛焉孳孳不知老之將至公之徳所以月異而嵗不同進進而至於淇奥之盛也淇奥緑竹此只是興起不必把淇奥作涵養浸潤形容美武公之徳亦不必把緑竹形容武公文章之煥於外亦不必以竹始生而興學問自修之益以竹堅茂而興服飾之盛與其徳之稱以竹至盛而興其徳之成有斐君子一句止是説和順積中英華發外處如切如磋如琢如磨就武公説賔筵詩全是克治工夫抑詩全是内外交養工夫切之而復磋之琢之而復磨之愈精愈宻直到至善地位切磋是始事琢磨是終事一生受用皆學問自修之功工夫如此其至故矜莊嚴毅恂慄之有諸中光明宣著威儀之形諸外瑟僴謂戒謹其所不睹恐懼其所不聞赫咺謂睟面盎背而施於四體終不可諠兮謂徳極其盛善極其至故孚誠所感輝光所被其洽民也深人自愛之而不能忘也便是抑詩所謂敬愼威儀維民之則二章言其威儀服飾之盛則以充耳琇瑩㑹弁如星美之三章言其徳器之成則以如金如錫如圭如璧美之琢磨猶有待於用力金錫圭璧則混成矣瑟僴猶有待於矜持今則寛綽而有斂束不迫之意戲謔而有莊厲難犯之色非盛徳之至乎夫聲色之化民末也今一言一動之㣲而能使人敬慕如此武公何以能若是哉不有賓筵詩何以善謔不為虐不有抑詩何以赫咺而有斐故觀詩人之美淇奥當先自二詩觀之看淇奥與看抑詩别看抑詩與看賓筵詩别武公一人也初看賓筵詩如小兒學步動足未免蹶躓及看抑詩如三日新婦學作舉止到看淇奥詩如端人正士應規入矩但看賓筵説醉亂氣象為何如抑詩説敬謹氣象為何如到淇奥詩便説君子氣象又何如甚矣威儀之不可忽也言語之不可易也天生蒸民有物有則貌言物也有則存焉趙孟語偷穆叔知其必亡晉侯受玉惰内史過知其無後春秋時每每以此觀人成子受脤不敬劉康公曰吾聞民受天地之中以生所謂命也是以有禮義動作威儀之則以定命也春秋時猶有識此等道理白圭之玷南容三復之如切如磋如琢如磨子貢言之曽子又言之神之格思不可度思矧可射思子思言之相在爾室尚不愧于屋漏子思又言之學詩如容如賜如參如伋可也否則詩有美刺古人之臧否也於我何預奚其切奚其近雖然學未至於淇奥毋戲戲害徳之端飲遇乎賓筵毋醉醉伐徳之賊抑之作武公踰九望百之年也以武公進徳之心嚴於既髦學者年少氣鋭修身謹行遷善改過當若何而可慎爾出話敬爾威儀若易也實難也而謹獨之學尤難獨行不愧影獨寢不愧衾此大小人事當於至切至近處求之若夫誨諄諄聴藐藐武公之所懼亦吾黨之所懼敢與同志勉之書發題書有古今不勝其多變矣中更殘缺諸儒勤而緝之有上古帝王之書則典謨訓誥誓命之外有三墳等書及劉向所録周書七十一篇是也有夫子筆定之書則昔之百篇為科斗文是也自百篇已定之餘旋經秦火復出漢壁而百篇又非夫子之舊矣故有伏生口授之書而晁錯以意屬讀之者是其一也有孔壁復出之書而孔安國變科斗為𨽻古謂之𨽻存古是其二也二者所傳或三十三篇或五十八篇則百篇既損而又損矣然伏生齊人也齊人語異口相傳授必有遺失自晁錯己病其不可盡知矣幸而繼出於屋壁之藏而漢人已無識科斗書者孔安國始以所聞伏生之書因義考文定其可知者更以竹簡寫之方伏生口授之書已失其本經所聞者既非真而古文又非後人之所易曉則更定之間豈無有差失者乎伏生之授如彼科斗之傳又如此沿流求源得一書而讀之亦云勤矣奈何巫蠱之禍方興是書之傳天其祕諸天下來世又安知有張霸偽書乗漏抵欺而得以惑世乎大抵漢晉儒者猶未見古文若大禹謨孔壁續書之首篇也地平天成而杜預謂其逸載見瞽瞍而趙歧謂其逸闗石和鈞載於五子之歌而韋昭謂其逸惟尹躬暨湯咸有一徳見於商書而鄭康成謂其逸若是者皆未見孔壁續出之書也㤗誓三篇雖非伏生所傳之舊而古文猶有存者予有亂臣十人同心同徳萇𢎞能道之杜預以為今㤗誓無此語民之所欲天必從之單襄公能記之韋昭以為今㤗誓無此語若是者皆未嘗見古文㤗誓也賈逵尚書之疏以火流為烏為周之瑞服䖍釋左傳之文以亂其紀綱為桀時其偽妄有如此者劉歆作三統厯引武成而有五日甲子咸劉商王受之語鄭康成注禹貢引𦙍征而有厥篚𤣥黄昭我周王之詞其乖牾有如此者若是者皆未嘗見孔傳也是則兩漢以来能及見古文者什一以偽傳偽者是也至晉齊之間是書漸出而舜典猶失至開皇始大備自漢巫蠱事起至隋開皇二年凡六百七十餘年向之五十八篇乃始克傳於世至天寳復廢古文以今文代之而頗改其詞如王道無頗改為无陂古文繇此遂絶則今之所傳者又復非安國之全書矣嗟夫安國定古文已非孔壁之全天寳易今文又非安國之全使千載而下博觀載籍引經考古孰從而定之哉武成洪範六經俱非全書尚書一經越自難看難看中却有好看處好看處須從大闗涉處説来且把武成洪範二篇看武纔告成便訪洪範這處書之次序儘好武成篇簡䇿或有錯亂經文或有缺逸或從本經次序或從劉氏王氏程子蔡氏改正皆可以通但須曉得武成大意的在何處洪範篇九疇之文龜背所負自洛而出或以為六十五字或以為三十八字或以為二十七字俱不必泥但須曉得洪範大綱的在何句盖武成是武功之已成也此書是定天下大大底規模武王伐商纔了便偃武修文此一着是武王智識髙逺盖以示天下不得已而用之之意次祀廟次柴望次百工受命次反商政次釋箕子囚封比干墓式商容閭次散財發粟次封建諸侯位序官聨次具民教次尊用賢徳詳悉周宻甚麽次第有大經畧有大智慮方能如此立經陳紀洪大也範法也此書是治天下大大底典法武王整頓人事纔定便訪問彛倫此一着武王的知道統在已而不在人在天而又不在已極之不建則彛倫斁極之建則彛倫敘禹傳之湯湯傳六百餘年亦惟箕子得之故道不可以不任範不可以不訪天下亦不可捨此以為治箕子亦謂道不可以不傳疇不可以不演天之理人之用今不可以不明天之所畀者數也而理也在其間禹之所敘者彛倫也箕子之為武王陳範者又彛倫之義疏也句句是用亦句句是理自初一曰以下至六極九疇之綱自一五行以下至終篇九疇之目在天惟五行在人惟五事以五行參五事而後天人合八政則人之所以因乎天五紀則天之所以示乎人皇極者君之所以建極三徳者治之所以應變稽疑又以人而聴於天庶徴又推天而徵於人福極又人感而天應五事曰敬所以誠身八政曰農所以厚生五紀曰協所以合天皇極曰建所以立極三徳曰乂所以治民稽疑曰明所以辨惑庶徵曰念所以省驗五福曰嚮所以勸六極曰威所以懲五行不言用無適而非用皇極不言數非可以數明本之以五行敬之以五事厚之以八政協之以五紀皇極之所以建乂之以三徳明之以稽疑驗之以庶徵勸懲之以福極皇極之所以行也天地開闢帝興王起孰能加此故武王之問為道也為天下也為後世也箕子之陳亦為道也為天下也為後世也甚矣天之未喪斯文也修文二字豈但如孔傳所謂行禮射設庠序而止洪範彛倫正斯文之所在重民五教又彛倫之所在此武成之後所以繼之洪範而洪範所以為道統之書武王所以為皇極之主也夫圖之出河書之呈洛當時必粗有八卦九疇之象數以發伏羲神禹之智故羲因之而畫八卦禹因之而作九疇千餘年後有文王而得伏羲之妙有箕子而得大禹之㣲意文王事商為三公之日與箕子為僚友議論嘗及此矣文武父子之間又安得不以此為言哉故武成克商未及一事首釋箕子囚武王正訪範地也箕子遇武王而不傳又誰傳哉此武成之後所以繼之洪範而洪範所以為道統之書武王所以為皇極之主也吁世有今古道無絶續殷之末周之興文王傳易武王傳範一聖人各了一件大大事固天意也然必武王訪箕子而後九疇之書出㣲箕子後世亦無以見洛書之遺文則箕子亦道統中之嫡傳也孟子盡心篇末歴敘羣聖與見知聞知之妙迺上及太公望散宜生而不及箕子何哉豈洪範一篇王訪于箕子箕子乃言曰夫子已敘於武成之後照耀方冊千古不刋正不待孟子之言而後傳邪道在箕子箕子得傳於武王而為萬世之治法道在夫子夫子不及行於當時而僅托萬世之空言雖然夫子之經不傳箕子之範烏乎傳文武之道未墜於地吾夫子之功大矣猗歟盛哉周禮禮書殘缺所存者三禮皆非全書也而周禮之可疑者尤多漢藝文志周官經六篇未嘗名曰周禮河間獻王傳所得書皆古文先秦舊書周官尚書禮記儒林傳平帝時又立左氏春秋毛詩逸禮古文尚書亦未嘗言及周禮不知周禮之名何始乎禮記經禮三百註謂周禮也周禮六篇其官有三百六十則康成名之也古無周禮書誰謂周公所作三禮正義謂周禮儀禮並周公所記又謂劉歆獨識其書為周公致太平之迹考之歆傳無斯語也疏家序周禮廢興謂鄭𤣥知周禮乃周公致太平之迹故能答臨碩問難則謂周公所定亦始於康成也然是書之出始於何時三禮正義謂漢武時有李氏獲之上河間獻王獨缺冬官今傳乃不載補考工記一事豈所謂周官者是耶藝文志謂孝文時樂人竇公獻其書乃周官大宗伯大司樂章則文帝時是書已有傳之者矣真古書歟否也歆傳哀帝初王莽舉歆復領五經歆乃集六藝羣書種别為七畧又言歆欲立左氏春秋及逸禮皆列於學官帝令歆與五經博士講論或不肯置對歆移書太常曰魯共王壊孔子宅得古文逸禮有三十九藏於秘府伏而未發成帝發祕藏校舊文得此或脱簡或間編禮失求於野古文不猶愈於野乎歆所謂逸禮其周官乎則又未立於學官也王莽傳莽奏立樂經益博士員徵天下通一藝以上及有逸禮周官等文字通知其意者皆詣公車記説庭中將正乖謬以一異説則周官博士之置必始於莽時矣疏家謂始於劉歆成於初元盖前此賈逵作周官解故馬融補周官傳不如康成之學行於世則周孔之學又盛於康成也讀周官而不讀鄭注非善讀經者也然鄭之説經亦有五失一引緯書二引司馬法三引春秋傳四引左氏國語五引漢儒禮記賈公彦一疏又惟鄭注是解胥失之矣姑舍是讀周官者多矣是此書者謂綱領盡見於序官之目其所不可聞者雖見於聨事合治之間其所不可紊者亦定於分職率屬之際謂學者當以意會母徒從事於物儀事數之末庶足以見成王周公之心謂有向上一截然其中無所不有方見古人開闊非是書者謂周制最大者莫若建都封國設官今與書洛誥召誥武成周官皆不合謂成王言六卿何嘗配天地四時兵謂之夏司空謂之冬最為無理謂男巫女巫方相氏此何為者謂天官却管甚宫壼謂八法九賦等事無非以法以利而已又其甚者謂莽之事歆之文以衰世之制為盛時之典悖理傷教甚矣吁禮非全書出又最後傳者又最寡此周禮之所以可疑是之者或失之過非之者尤失之過此周禮之所以難講大抵此書不可不信亦不可盡信此書法令政事所聚如後来百官志相似或出於政典或出於九刑或出於司馬法或出於考工記有周公舊章者有後来添續者有春秋戰國以来偽妄駁雜之書與秦火之後掇拾於灰燼之餘者有出於漢儒私意欲用其師説者有或利其購金而妄言者後之作者纂其典章法度而成一代之書故通謂之周禮信者以為周公非也不信者以為歆亦非也讀是書者考其合於聖人者取之不合於聖人者勿强為之説而不可盡以為謬此書今以進士舉列於學官學者序為六籍莫之少貶隨聲竊響一例詆訾豈為尊經開卷第一惟王建國辨方正位體國經野設官分職以為民極五句便費解説唐太宗與魏徵問對太宗如何斷曰誠哉深乎如何又語魏徵不井田不封建而欲行周公之道不可得也此五句上三句是一截下二句是一截建國二字合天子與諸侯説自王畿以至畿外大小之國皆王者所建也王者自治其千里乃參日景而考極星求地之中而辨方焉乃右社稷而左宗廟求朝之中而正位焉於是有城郭宫室之制四面拱衛莫不有體謂之體國於是有井牧溝洫之制縱横曲直莫不有經謂之經野這是建國井地一時都了王者不能以獨治其國也必有賢智為之臣久於其官而不去於是設六官而分之以職爵秩之崇卑以事之緩急職掌之詳畧因事之輕重其體統正其名分嚴凡若是者為民故也故結之曰以為民極極如商邑翼翼四方之極千里之畿地狭民寡治之者衆上而卿次而大夫士下而庶人之在官者自百而歸之六自六而歸之一所操者至簡大者與之為大小者與之為小所行者至易習之於尊卑等級之中而消其亡等冒上之心使之趨向定而分守安民極於是乎立矣合看建國是總説辨方正位體國經野是説王畿不辨方正位不體國經野如何㑹設官分職中國之體既正居官有舍食禄有田然後可以居百官而臨萬民所以設官分職以為民極分下截説此所以不封建不井田而欲行周公之道不可得也未論周禮是周公作假使出於漢儒解説及此亦是曉得古人井田封建意思此五句與書中明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民相似古人作書皆有綱領看此五句周官備矣故善讀周禮者是者是之非者非之非者吾未敢議吾輩相與求其是可矣小戴禮樂記周官大司樂至司干二十官樂六經之一其書今亡無字求之禮記僅有樂記一篇馬融以此足小戴禮有河間獻王之記有劉向校讎之記博士諸生共采周官及諸子言樂事者二十四卷此河間記也天禄校書得二十三篇此劉向記也今此記所傳合十一篇自凡音之起以下為樂本自樂者為目以下為樂論自王者功成作樂以下為樂禮自昔者舜作五絃之琴以下為樂施自夫民有血氣心知以下為樂言自凡姦聲感人以下為樂象自樂者情不可變以下為樂情自魏文侯問於子夏以下為魏文侯自賔牟賈侍坐於孔子以下為賔牟賈自君子曰禮樂不可斯須以下為樂化自子貢見師乙而問以下為樂師司馬史記樂書共十一篇皆為褚先生升降亂之不似記文次叙則向所校自奏樂以至竇公不入記矣竇魏文侯時人至漢文時年已百八十餘其樂章即今之周官大司樂也然樂記與大司樂俱不可謂樂之經史記正義謂樂記公孫尼子次撰胡明仲謂是子貢作或又謂非孟子以下不能作大抵此記有出於家語出於荀子出於易大傳與文言河間集博士諸生所作王定傳之定一作度當考王禹又傳之至向之所校亦不外於河間所記又有所謂聖人曰君子曰故曰者豈多采前言以備著作與中間格言極多意思極好前輩亦謂當為大學中庸之次注疏儘自可觀在人辨别得出若周官大司樂以至司干凡二十官皆屬宗伯禮樂非二事也司樂謂樂之大者樂師謂樂之小者大則律同聲音六舞之合足以黙交隠顯之間非探索樂理之至者不能也小則步武疾徐之㣲皆足以致養和平之徳非研窮樂理之㣲者不能也故以下大夫主之彼大胥小胥者隨事大小而致察焉無復用力於廣大精㣲之妙然上下相承有不容缺自司樂至小胥所掌者既樂之事則樂事或奏或歌必有所屬故奏歌其樂者瞽矇也相矇而奏歌者眡矇也以奏歌而教矇者小師也使矇有所取正者大師也彼四命之大夫爵已重矣而矇之衆凡三百人列以三等其上者才四十人耳夫以懵懵無見之人傾耳奏歌之節心志之專念慮之壹妙足以得天地之中聲次足以㡬聲之上下又次足以致諷誦之諫古之神瞽繇此其選則太師之職豈為卑哉自太師至眡瞭既掌奏歌之節則因其聲之所合達其聲之所寓度數齊量要必有託故樂器之制係於六律典同又掌律同之和律同不可偏廢而官獨曰典同者樂以統同為貴十有二律之相配必分其六以為同然後取隂陽之合隂陽合則生生之理為不息故典同掌其和以為樂器度數齊量定於此而後他器從之笙磬遞發於樂作之時鐘鎛交鳴於樂作之後所以為樂之成然樂不至於說逺人則不止則納蠻夷之樂於祭祀燕享其極功與然韎師旄人鞮鞻氏皆教夷樂也而旄人繼以籥師籥章鞮鞻氏繼以典庸器司干者盖逺人之服由文徳以来之彼慕徳而来者莫不目見聲歌舞蹈之節籥執羽而龡則文舞於是乎寓擊土鼓而和則詩章於是乎誦皆以象文徳也至鞮鞻氏合四夷之樂以歌則徳化益逺矣典庸器所以寳其功也先王長慮却顧安不忘危文事必有武備司干又教之以武舞與然事其事者又無非知理道審物情者為之如詩所謂俁俁執籥者皆碩人陽陽執簧者皆君子也雖然有有聲之樂有無聲之樂樂記多説無聲之樂大司樂以下多掌有聲之樂縁古人於樂器數一一洞曉而或簡其義故樂記推原樂之所自生就心性情上説来周官又恐人忽器數之末而不知一物各寓一理故多教之同律歌舞樂記第一章説凡音之起由人心生人生而静章説性説好惡説天理人欲樂著大始章説隂陽鬼神説天地之間動静樂不可為偽章説和順積中英華發外樂以治心章説久則天天則神多少㣲妙豈但如魏文賔牟賈師乙之論樂云乎哉樂以律為本故大司樂以律同聲音六舞大合樂太師亦掌律同合隂陽之聲掌鼗鼓柷敔壎箎蕭管弦歌者有人掌擊頌磬笙磬編鐘者有人掌教龡竽笙篴管春牘應雅者又有人掌庸器筍簴者又有人清濁髙下小大進退無非求合隂陽之自然詩存則樂存故太師教六詩鍾師奏九夏籥章龡豳雅頌大射節以騶虞貍首車行合於肆夏采齊皆詩也樂不舞則不成故以樂舞教國子以弓矢舞詔諸侯又教小舞又詔臯舞又有帗舞羽舞皇舞人舞皆所以均調其血氣條暢其精神涵養其心術也樂於祭為大故天地神示四望先祖之祭或薦或降各有其序一祭而奏一律歌一同而舞一樂而隂陽之聲有分有合相繼者天之道故於天神用之相生者地之功故於地示用之相合者人之情故於人鬼用之其六變八變九變各以數起而非有難易之别其一變至六變所致盖樂奏之有條理特想其所致之神必有先後也樂之器以精而寓於粗樂之工由竅而入於妙度之長短數之多少齊之輕重量之廣狭又皆起於黄鍾之絫黍未可以形器視之也然中和者禮樂之原樂記以禮樂為中和之紀周官亦何嘗舍中和言禮樂哉樂導和也而兼中言之所謂隂陽剛柔仁義靡不相備然後可謂之樂如八音克諧無相奪倫豈不是和即中之用中即和之體何嘗分作兩項大司徒曰防偽而教之中防情而教之和大宗伯曰隂徳以中禮防之陽徳以和樂防之即是此理鄭註以中為忠信之忠便是不識中字體段但樂記於禮樂多對説開了如大司樂説教字道字徳字而樂徳以中和為六徳之先便曉得體用一貫處吁樂經雖亾幸有此爾他經如孝經語孟詩書言樂處尚皆可考唯吾夫子自衛反魯然後樂正而所正者亦無傳矣惜夫惜夫況夫子時樂一僭於諸侯再僭於大夫三僭於陪臣春秋安得而不脩春秋書樂只三事耳一初獻六羽二壬午猶繹三去樂卒事聖人斟酌輕重如權衡然譏之不可勝譏因其失禮之甚者而譏之有制作之意無制作之時豈不又為吾夫子惜哉惜哉雖然樂之原立乎易他日更僕言之投壺記射義記投壺與射屬賔禮亦屬嘉禮射者男子之事故古者祈子帶弓韣生子縣桑弧其成童也教以射其貢之也試以射則射非君子所可忽也然射有大射有賓射有燕射士無大射而有燕射賓射庶人無賓射燕射特有主皮之射而已此謂禮射大射之侯栖鵠賓射之侯設正燕射之侯畫獸以象正鵠鵠取名於鳱鵲正取名於題肩皆禽之捷黠難中者故以中為雋其義則鵠者直也正者正也直已正志然後能中主皮者無侯張獸皮而射之主於獲也記曰卿大夫士之射也必先行鄉飲酒之禮鄉飲酒亦燕也燕以娱賓故飾之以禮樂於是有鄉射之禮且以習容且以觀藝禮不可無義故明長幼之義焉投壺又射禮之細也壺飲器亦所以樂賓類於燕禮以所飲之壺寓所投之矢而制禮者因為之節文也庭之脩廣或不足以張侯置鵠賓客之衆或不足以備官比耦然其容體比於禮其節奏比於樂志正體直審固求中所以觀徳者猶在此古人所以不廢也投壺之籌曰矢勝算則馬贊其禮則以司射實其算則以射中絃其詩則以射節之貍首鼓其節則以射鼓之半而釋算數算勝飲不勝皆與射禮相類其用鹿中者投壺輕於射故用中之下禮耳吾夫子射於矍相之圃盖先行鄉飲而後射也觀者如堵牆則尚有在門外者矣至於將射則以司正為司馬司正以治禮名司馬以治兵名燕禮事也射兵事也未旅士猶可入而與射故子路執弓延射此為司射有入不入及去者入者之詞卒射司馬反為司正然後旅酬古者於旅也語將旅使二人舉觶於賓與大夫射事畢則衆賔皆在賓位故公罔裘序㸃舉觶有去者處者存者之辭賔在門外則司馬誓之使惡者不入賓在位則舉觶而語者不復斥惡但使善者處耳賁軍亡國則不知君臣之義與為人後則不知父子之恩不知君臣之義則不足以為君臣之鵠不知父子之恩則不足以為父子之鵠夫射者各繹已之志以為之鵠者也不能是者固不足使之觀射矣幼壯者自十年至于三十也耆耋者六十七十也旄期者八十九十至于百年也幼壯者孝弟耆耋者好禮不従流俗脩身以俟者徳有立矣好學不倦好禮不變旄期稱道不亂者徳有成矣盖士之立於世無惡者寡無惡者有之有立者又寡有立者有之成徳者又寡矣者不疑詞也衆之所㑹簡别賢不肖人之所難言也故以疑詞示之其去者處者㢙有存者盖亦疑詞也射藝也而可以分賢不肖者以此故先王養人於無所事之時使其習之而不憚煩則不孫之行無自而作而其用心也專不之乎此又之乎彼久而安之無往非禮其不成徳也乎投壺之禮雖殺於射而主人奉矢三請賓三辭而後許拜受拜送般還以辟有加於射者不敢以禮殺而紓吾敬此徳所以脩交所以久也投壺用射之中中以所志為中故亦以中為善矢有本末順投為入本末之序正矣左右拾投賓主之義答矣勝飲不勝所以養不能也多馬有慶所以尚有藝也執之謂算以計多少為義勝之謂馬以勝敵為義其取一勝者不用之馬而補勝黨未足之算又所以成人之美而無欲多上人之心可見矣魯薛之令為年穉者戒也幠敖偝立踰言恐䙝慢而不恭常爵與浮皆罰爵也飲燕之間易狎童子之心易流令之所以飾其敬不令而責之敬則近於暴故令之而後罰賓黨為上主黨為下射禮亦然主黨在所投賓黨在所敬也主人以仁接賓則樂人樂賔者也使者及童子事人者也故屬主黨司射作人者也庭長正人者也冠士行禮者也立者觀禮者也故屬賓黨壺以授矢致樂者也故主黨執之中以盛算取勝者也故賓黨奉之貴賤少長之别使人樂而不淫敬而不衰誰謂投壺特末技與合二章而觀魯薛之令所以教小學也裘㸃之語所以進大學也魯薛之詞詳畧雖異而皆欲其禮之謹裘㸃之誓疏宻雖異而皆欲其徳之成又使反而求之皆不怨勝已者歸諸仁而已矣藝云乎哉世下俗偷執射者或以為笑投壺者反以為戲此豈善習於禮者古人一物各有精義習禮不首其義未知可乎不也按大戴禮有投壺篇小戴掇而用之有些異同如哨壺大戴作峭字是大戴無薛令弟子之詞及鼓節却載貍首詩與射義所載詩八句外更有數句射禮天子奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩而投壺特奏貍首者盖取其樂會時也大戴之言投壺則曰嗟爾不寧侯為爾不朝于王所故抗而射女强飲强食貽爾曽孫諸侯百福其言與諸侯射禮相類則小戴所記特大夫士之禮而已四如講稿卷四
